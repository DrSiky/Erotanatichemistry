<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Atlas Clínico Integrado — Espectros Afectivos, Psicóticos y WKL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;background:#f9f8f4;color:#18160f}

/* ── MASTER NAVIGATION ───────────────────────────────────── */
#master-nav{
  flex-shrink:0;display:flex;align-items:stretch;
  background:#18160f;border-bottom:2px solid #333;
  height:52px;overflow-x:auto;
}
#nav-title{
  flex-shrink:0;padding:0 18px;display:flex;flex-direction:column;
  justify-content:center;border-right:1px solid #333;min-width:220px;
}
#nav-title h1{font-family:'EB Garamond',Georgia,serif;font-size:13px;font-weight:500;color:#f0ebe0;letter-spacing:.02em;line-height:1.2}
#nav-title p{font-size:8px;color:#888070;font-style:italic;margin-top:1px}
#nav-tabs{display:flex;flex:1}

.mtab{
  flex-shrink:0;padding:0 16px;
  display:flex;align-items:center;gap:7px;
  font-size:11px;font-weight:500;color:#888070;
  border:none;background:transparent;cursor:pointer;
  border-bottom:3px solid transparent;border-top:3px solid transparent;
  font-family:'DM Sans',system-ui,sans-serif;
  transition:all .15s;white-space:nowrap;
  position:relative;
}
.mtab:hover{background:rgba(255,255,255,.05);color:#f0ebe0}
.mtab.on{color:#f0ebe0;border-bottom-color:currentColor}
.mtab .badge{
  font-size:8px;padding:1px 5px;border-radius:99px;
  background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.12);
  font-family:'DM Sans',system-ui,sans-serif;letter-spacing:.04em;
}
.sep{width:1px;background:#333;flex-shrink:0;margin:10px 4px}

/* ── APP CONTAINERS ──────────────────────────────────────── */
#app-wrap{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
.app-section{position:absolute;inset:0;display:none;flex-direction:column;min-height:0}
.app-section.on{display:flex}

/* ── SPECTRUM APP (tabs 1-4) ─────────────────────────────── */
#spec-section{background:#f9f8f4}
#spec-app-hdr{
  flex-shrink:0;background:#18160f;color:#f8f7f2;
  padding:6px 18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #333;
}
#spec-app-hdr h2{font-family:'EB Garamond',Georgia,serif;font-size:13px;font-weight:500}
#spec-app-hdr p{font-size:9px;color:#888070;font-style:italic}
#spec-tabs{flex-shrink:0;display:flex;background:#f2f0ea;border-bottom:1.5px solid #bbb0a0}
.stab{
  padding:6px 15px;cursor:pointer;font-size:11px;font-weight:500;color:#888070;
  border:none;border-bottom:2px solid transparent;margin-bottom:-1px;
  font-family:'DM Sans',system-ui,sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;
  background:transparent;
}
.stab:hover{color:#18160f}
.stab.on{color:#18160f;font-weight:500;border-bottom-color:var(--scol,#c0392b)}
#spec-main{flex:1;display:flex;min-height:0}

/* Map panel: 50% — right column gains horizontal space */
#map-panel{
  flex:0 0 50vw;
  display:flex;flex-direction:column;
  border-right:1px solid #ddd;background:#fffffe;
  position:relative;overflow:hidden;
}
#map-panel svg{flex:1;width:100%;height:100%;display:block}

/* Right sidebar: 50% — cards on top, detail fills rest */
#right-sidebar{
  flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden;
}
#info-panel{
  flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden;
}

/* Detail panel: fills ALL remaining space below cards */
#specDetail{
  flex:0 0 32%;min-height:0;
  border-top:2px solid #ddd;background:#f2f0ea;
  display:flex;flex-direction:column;overflow:hidden;
}
#ring-bar{
  flex-shrink:0;display:flex;gap:5px;padding:7px 12px;
  border-bottom:.5px solid #ddd;background:#f2f0ea;
  align-items:center;flex-wrap:wrap;
}
#ring-bar label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:#888070;margin-right:3px}
.rbtn{font-size:9px;padding:3px 9px;border-radius:99px;cursor:pointer;border:.5px solid;background:transparent;font-family:'DM Sans',system-ui,sans-serif;transition:all .15s}
.rbtn.on{color:white}
.swrap{margin-left:auto;display:flex;align-items:center;gap:5px}
#specSearch{font-size:10px;padding:3px 8px;border:.5px solid #ccc;border-radius:99px;background:#fffffe;color:#18160f;font-family:'DM Sans',system-ui,sans-serif;width:150px;outline:none}
#specSearch:focus{border-color:#888070}
#cards{flex:1;overflow-y:auto;padding:10px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:8px;align-content:start}
.card{background:#fffffe;border:.5px solid #ddd;border-radius:6px;padding:9px 10px;cursor:pointer;transition:border-color .12s,box-shadow .12s;border-left:3px solid transparent}
.card:hover{border-color:#bbb;box-shadow:0 1px 12px rgba(0,0,0,.10)}
.card.active{box-shadow:0 0 0 2px var(--scol,#c0392b)}
.card-ring{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;opacity:.7;margin-bottom:3px}
.card-name{font-size:11px;font-weight:500;line-height:1.3;margin-bottom:4px}
.card-ab{font-size:9px;font-style:italic;color:#888070;margin-bottom:5px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:8px;padding:1px 5px;border-radius:3px;border:.5px solid}
.cons-h{background:rgba(192,57,43,.08);color:#c0392b;border-color:rgba(192,57,43,.25)}
.cons-m{background:rgba(201,112,22,.08);color:#c97016;border-color:rgba(201,112,22,.25)}
.cons-l{background:rgba(58,95,160,.08);color:#3a5fa0;border-color:rgba(58,95,160,.25)}
.empty{grid-column:1/-1;text-align:center;padding:30px;color:#bbb0a0;font-size:13px}
#specDetail-inner{flex:1;overflow-y:auto;padding:14px}
#specDetail-empty{display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;color:#bbb0a0;font-size:12px;line-height:1.6;font-family:'EB Garamond',Georgia,serif;font-style:italic}
.dbdg{display:inline-block;font-size:8px;text-transform:uppercase;letter-spacing:.09em;padding:2px 6px;border:.5px solid;border-radius:2px;margin-bottom:7px;font-weight:600}
.dname{font-size:17px;font-weight:500;font-family:'EB Garamond',Georgia,serif;line-height:1.25;margin-bottom:2px}
.dau{font-size:10px;color:#888070;font-style:italic;margin-bottom:9px;font-family:'EB Garamond',Georgia,serif}
.ddesc{font-size:11px;line-height:1.6;color:#4a4838;margin-bottom:8px}
.dsh{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:#888070;font-weight:600;margin-bottom:4px;padding-bottom:3px;border-bottom:.5px solid #ddd;margin-top:10px}
.dfeats{list-style:none}
.dfeats li{font-size:10.5px;color:#4a4838;padding:2.5px 0;border-bottom:.5px solid #ece9e0;display:flex;gap:6px;line-height:1.4}
.dfeats li::before{content:'—';color:#c0392b;flex-shrink:0;font-size:10px}
.dtx{padding:7px 9px;border-radius:4px;font-size:10.5px;line-height:1.55;color:#4a4838;margin-top:2px}
.dnote{border-left:2.5px solid #3a5fa0;padding:5px 8px;font-size:10px;font-style:italic;line-height:1.55;color:#4a4838;margin-top:10px}
.dcons{margin-top:10px;display:flex;align-items:center;gap:6px;font-size:10px;color:#4a4838}
#tt{position:fixed;pointer-events:none;background:#18160f;color:#f8f7f2;padding:5px 9px;border-radius:4px;font-size:10px;max-width:220px;line-height:1.4;z-index:999;display:none;box-shadow:0 2px 12px rgba(0,0,0,.3)}

/* ── WKL IFRAME SECTION ──────────────────────────────────── */
.wkl-banner{
  flex-shrink:0;background:#1c1408;padding:7px 18px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(100,70,30,.3);
}
.wkl-banner span{font-size:9px;color:#7a6a52;font-style:italic}
.wkl-tab-btn{
  font-size:10px;padding:3px 10px;border-radius:99px;cursor:pointer;
  border:.5px solid rgba(100,70,30,.3);background:rgba(30,20,8,.6);
  color:#b4a48e;font-family:'DM Sans',system-ui,sans-serif;transition:all .15s;
}
.wkl-tab-btn:hover{background:rgba(160,126,200,.15);border-color:rgba(160,126,200,.4);color:#d0c8e0}
.wkl-tab-btn.on{background:rgba(160,126,200,.2);border-color:rgba(160,126,200,.5);color:#e0d8f0}

/* ── SPECTRUM SECTOR FILLS ───────────────────────────────── */
.sf-dep{fill:rgba(26,82,118,.06)}
.sf-bip1{fill:rgba(192,57,43,.06)}
.sf-bip2{fill:rgba(30,107,56,.06)}
.sf-bip3{fill:rgba(122,91,167,.06)}
.sf-sch1{fill:rgba(192,57,43,.06)}
.sf-sch2{fill:rgba(58,95,160,.06)}
.sf-sch3{fill:rgba(122,91,167,.06)}
.sf-br{fill:rgba(155,45,155,.06)}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh">

<!-- MASTER NAV -->
<nav id="master-nav">
  <div id="nav-title">
    <h1>Atlas Clínico Integrado</h1>
    <p>Espectros afectivos · Psicóticos · WKL</p>
  </div>
  <div id="nav-tabs">
    <button class="mtab on" data-app="spec" data-spec="dep" style="--c:#1a5276;border-bottom-color:#1a5276" onclick="switchMaster(this)">

</nav>

<div id="app-wrap">

  <!-- SPECTRUM SECTION -->
  <div id="spec-section" class="app-section on">
    <div id="spec-app-hdr">
      <div>
        <h2>Espectros Afectivos y Psicóticos — Mapa Clínico-Operativo</h2>

      <button class="stab on" data-spec="dep" style="--scol:#1a5276" onclick="switchSpec(this)">📉 Espectro Depresivo Mayor</button>
      <button class="stab" data-spec="bip" style="--scol:#c0392b" onclick="switchSpec(this)">◎ Espectro Bipolar</button>

      <button class="stab" data-spec="sch" style="--scol:#881010" onclick="switchSpec(this)">⬤ Espectro Psicótico</button>
      <button class="stab" data-spec="wkl" style="--scol:#7245a4;border-left:1px solid #ccc;margin-left:4px" onclick="switchSpec(this)">⬡ WKL · Leonhard</button>
    </div>
    <div id="spec-main">
      <div id="map-panel">
        <svg id="mapsvg" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:100%"></svg>
      </div>
      <div id="right-sidebar">
        <div id="info-panel">
          <div id="ring-bar">
            <label>Círculo:</label>
            <button class="rbtn on" data-r="all" onclick="filterRing(this)">Todos</button>
            <button class="rbtn" data-r="1" onclick="filterRing(this)">C1 · Núcleo</button>
            <button class="rbtn" data-r="2" onclick="filterRing(this)">C2 · Expansiones</button>
            <button class="rbtn" data-r="3" onclick="filterRing(this)">C3 · Mixto/Suave</button>
            <button class="rbtn" data-r="4" onclick="filterRing(this)">C4 · Histórico</button>
            <div class="swrap"><input id="specSearch" type="text" placeholder="Buscar entidad…" oninput="onSearch(this.value)"></div>

          <div id="specDetail-inner">
            <div id="specDetail-empty">Selecciona una entidad en el mapa o en las tarjetas</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /app-wrap -->

<script>
// ════════════════════════════════════════════════════════════════════
// MASTER NAVIGATION
// ════════════════════════════════════════════════════════════════════
function switchMaster(btn){
  document.querySelectorAll('.mtab').forEach(b=>{b.classList.remove('on');b.style.borderBottomColor='transparent'});
  btn.classList.add('on');
  const c=btn.style.getPropertyValue('--c')||'#7245a4';
  btn.style.borderBottomColor=c;

  const app=btn.dataset.app;
  document.getElementById('spec-section').classList.toggle('on',app==='spec');

  if(app==='spec'){
    const spec=btn.dataset.spec;
    document.querySelectorAll('.stab').forEach(t=>{t.classList.toggle('on',t.dataset.spec===spec)});
    if(spec)switchSpecById(spec);
  }
}

// ════════════════════════════════════════════════════════════════════
// SPECTRUM APP DATA
// ════════════════════════════════════════════════════════════════════
const RCC={1:'#c0392b',2:'#c97016',3:'#a07820',4:'#3a5fa0'};
const RCF={1:'rgba(192,57,43,.10)',2:'rgba(201,112,22,.06)',3:'rgba(160,120,32,.04)',4:'rgba(58,95,160,.02)'};
const CONS={h:{col:'#e53e3e',lbl:'Alto consenso DSM-5/CIE-11',cls:'cons-h'},m:{col:'#ed8936',lbl:'Consenso moderado',cls:'cons-m'},l:{col:'#3b82f6',lbl:'Bajo consenso / histórico',cls:'cons-l'}};
const RLBL={1:'C1 · Núcleo DSM-5/CIE-11',2:'C2 · Expansiones Akiskal',3:'C3 · Mixto / Bipolaridad suave',4:'C4 · Histórico / Controvertido'};

const SPECTRA={
// 0°=derecha=Mania/Afectivo · 90°=abajo · 180°=izquierda=Depresion/Deficit · 270°=arriba (CW)
// Radio: C1=nucleo DSM-5 (maximo consenso) → C4=periferia (historico/discutido)
// Angulo: afinidad temperamental dentro del espectro

dep:{col:'#1a5276',
 pL:{t:'Inhibición pura',col:'#1a5276'},pR:{t:'Mezcla / bipolaridad',col:'#c0392b'},
 sectors:[
  {a1:140,a2:220,col:'#1a5276',lbl:'Melancólico / inhibido'},
  {a1:220,a2:140,col:'#4a7cb5',lbl:'Ansioso / atípico / reactivo'},
 ],
 entities:[
  {id:'ddm',n:'Trastorno depresivo mayor',ab:'TDM',c:1,a:180,cs:'h',
   au:'DSM-5-TR (APA, 2022) / CIE-11 (OMS, 2019)',
   desc:'Episodio depresivo mayor completo (≥5 síntomas durante ≥2 semanas, con ánimo deprimido o anhedonia como síntoma obligatorio y deterioro funcional significativo). Entidad con máximo consenso nosológico pero marcada heterogeneidad interna. Prevalencia-vida ~15-17%; relación mujer:hombre 2:1.',
   feats:['≥5 síntomas depresivos ≥2 semanas; ánimo deprimido/anhedonia obligatorio (criterio A DSM-5-TR)','Deterioro funcional significativo (criterio B) en ámbito laboral, social o personal','Heterogeneidad interna: subtipos melancólico, atípico, psicótico, catatónico, peripartum, estacional','Inicio <25 años: marcador de sospecha de espectro bipolar subyacente (evaluar BSDS)','Tasa de recurrencia: >50% tras 1er episodio; >80% tras dos episodios previos','Prevalencia-vida ~15-17%; 2:1 mujeres; pico de incidencia 25-44 años','Escalas de referencia: HAM-D-17, MADRS, PHQ-9, BDI-II'],
   tx:'ISRS/IRSN (1ª línea); agomelatina (perfil circadiano-melatoninérgico); mirtazapina (insomnio/anorexia; efecto rápido); vortioxetina (función cognitiva); TEC en formas graves, psicóticas o con riesgo vital inminente; esketamina intranasal (Spravato) en depresión resistente. Combinación fármaco-psicoterapia siempre superior a cualquier monoterapia.',
   note:'El diagnóstico de TDM es un punto de entrada nosológico, no de llegada. Exige reevaluación periódica del espectro bipolar, especialmente ante recurrencia, resistencia o respuesta adversa a AD. La evaluación longitudinal y el perfil temperamental son imprescindibles para diferenciar unipolar de bipolar.'},
  {id:'ddp',n:'T. depresivo persistente (distimia)',ab:'Distimia',c:1,a:195,cs:'h',
   au:'DSM-5-TR / CIE-11; Keller & Shapiro (1982); McCullough JP (CBASP)',
   desc:'Estado de ánimo deprimido crónico ≥2 años (adultos; ≥1 año en menores) con ≥2 síntomas depresivos subumbrales. Alta carga funcional acumulada por su cronicidad. La "doble depresión" (distimia + EDM superpuesto) es la presentación clínica más frecuente.',
   feats:['Humor deprimido crónico ≥2 años (adultos) / ≥1 año (menores) con ≥2 síntomas subumbrales','Síntomas: insomnio/hipersomnia, baja energía, baja autoestima, dificultad de concentración, desesperanza, apetito alterado','Doble depresión: EDM superpuesto a distimia basal (forma clínica más frecuente)','Alta comorbilidad: ansiedad (70%), TUS (30%), trastornos de personalidad cluster C','Inicio insidioso (frecuentemente adolescencia) con normalización del estado de ánimo bajo','Alta tasa de infradiagnóstico: los pacientes no consultan por "depresión" sino por consecuencias','Evaluación: HAM-D, MADRS crónico, CGI; CBASP como psicoterapia de elección (nivel I)'],
   tx:'ISRS (1ª línea farmacológica); IRSN en formas con fatiga/dolor; CBASP (Cognitive Behavioral Analysis System of Psychotherapy): única psicoterapia específicamente diseñada para depresión crónica con evidencia nivel I (Keller et al., NEJM, 2000); amisulprida a dosis bajas. Combinación CBASP + fármaco: superior a cualquier monoterapia.',
   note:'El CBASP produce cambios cualitativos distintos a la TCC estándar al abordar el patrón relacional crónico que mantiene la distimia (análisis situacional, transferencia interpersonal). Keller et al. (NEJM, 2000) demostraron por primera vez superioridad de la combinación sobre las monoterapias en depresión crónica.'},
  {id:'emel',n:'Episodio depresivo melancólico',ab:'EDM melancólico',c:1,a:205,cs:'h',
   au:'DSM-5-TR (especificador); Parker G et al.; Taylor MA & Fink M',
   desc:'EDM con características melancólicas: anhedonia profunda con pérdida de reactividad al placer, despertar precoz (≥2h antes), variación diurna marcada (peor matutino), inhibición o agitación psicomotriz prominentes. Mayor sustrato biológico diferenciado.',
   feats:['Anhedonia profunda: pérdida de reactividad al placer incluso ante eventos claramente positivos','Despertar precoz ≥2 horas antes de lo habitual (independiente de la dificultad de inicio del sueño)','Variación diurna marcada: peor rendimiento y mayor disforia por las mañanas','Inhibición o agitación psicomotriz prominentes y observables por el clínico','Pérdida ponderal marcada (>5% peso corporal/mes) o anorexia grave','Culpa excesiva o inapropiada que puede alcanzar dimensiones delirantes','Neurobiología diferenciada: hipercortisolemia, prueba de supresión dexametasona (DST), alteración eje HPA'],
   tx:'AD noradrenérgicos (1ª línea específica): venlafaxina, desipramina, nortriptilina. TEC: tratamiento de primera elección en formas graves, con riesgo vital o resistentes; tasa de respuesta 80-90%. ISRS en monoterapia: evidencia inferior en melancolía.',
   note:'Parker et al. argumentan la melancolía como entidad biológica diferenciada con respuesta farmacológica específica al perfil noradrenérgico. El TEC sigue siendo el tratamiento con mayor tasa de respuesta documentada en melancolía grave. La anhedonia como síntoma central predice respuesta insuficiente a ISRS en monoterapia.'},
  {id:'eatip',n:'Episodio depresivo atípico',ab:'EDM atípico',c:1,a:345,cs:'h',
   au:'DSM-5-TR (especificador); Akiskal HS; Perugi G et al.; Liebowitz et al.',
   desc:'Reactividad del ánimo conservada (brightening ante estímulos positivos) + ≥2 síntomas atípicos: hipersomnia, hiperfagia/aumento ponderal reactivo, parálisis del plomo, hipersensibilidad interpersonal al rechazo como rasgo estable. Alta prevalencia en espectro bipolar.',
   feats:['Reactividad del ánimo conservada: mejora con eventos positivos (criterio A obligatorio)','Hipersomnia ≥10h o hipersomnia diurna marcada (≥2h más que el habitual)','Hiperfagia, ansia por carbohidratos, aumento ponderal reactivo','Parálisis del plomo (leaden paralysis): sensación física de peso/pesadez en extremidades (horas-días)','Hipersensibilidad interpersonal al rechazo como rasgo estable del carácter (no solo en episodio)','Alta prevalencia en espectro bipolar: >50% de las dep. atípicas tienen sustrato bipolar (Akiskal, Perugi)','IMAO clásicamente superiores a tricíclicos (Liebowitz et al., meta-análisis)'],
   tx:'ISRS (1ª línea clásica); IMAO (tranilcipromina, fenelzina): evidencia de superioridad sobre tricíclicos; litio si marcadores bipolares confirmados; evitar tricíclicos en monoterapia cuando hay marcadores bipolares concomitantes.',
   note:'La depresión atípica tiene la mayor prevalencia en el espectro bipolar de todos los subtipos depresivos. Su reconocimiento debe desencadenar evaluación sistemática de marcadores de vulnerabilidad bipolar (BSDS, Ghaemi et al.). La hipersensibilidad interpersonal al rechazo como rasgo estable es el marcador más específico y diferenciador del subtipo atípico.'},
  {id:'dpsic',n:'Depresión psicótica',ab:'EDM psicótico',c:1,a:215,cs:'h',
   au:'DSM-5-TR (especificador); CANMAT 2023; Wijkstra J et al.',
   desc:'EDM con delirios y/o alucinaciones congruentes o no congruentes con el estado de ánimo. Alta gravedad global y riesgo suicida elevado. El TEC es el tratamiento de primera elección cuando hay riesgo vital.',
   feats:['Delirios congruentes: nihilistas ("estoy muerto"), hipocondríacos, de culpa catastrófica, de ruina económica','Delirios no congruentes: de referencia, de persecución, de grandeza (peor pronóstico y mayor confusión diagnóstica)','Alucinaciones auditivas acusatorias ("eres mala persona") o imperativas','Mayor gravedad funcional y mayor riesgo de hospitalización que EDM sin psicosis','TEC: eficacia >80%; tratamiento de primera elección cuando hay riesgo vital inminente','AD en monoterapia: contraindicado (respuesta inferior al 50%); combinación AD+AP obligatoria','Diagnóstico diferencial crítico con TB I psicótico: requiere anamnesis longitudinal cuidadosa'],
   tx:'TEC (primera elección con riesgo vital inminente, catatonia o resistencia); combinación AD + antipsicótico atípico (olanzapina + fluoxetina: evidencia nivel I; risperidona + AD; quetiapina). AD en monoterapia: contraindicado.',
   note:'La depresión psicótica tiene la mejor relación riesgo-beneficio para el TEC de todos los trastornos del eje I. >50% de los pacientes con un primer EDM psicótico desarrollarán episodios maníacos en el seguimiento, lo que hace obligatoria la reevaluación longitudinal del espectro bipolar.'},
  {id:'dpp',n:'Depresión perinatal / postparto',ab:'Dep.perinatal',c:1,a:155,cs:'h',
   au:'DSM-5-TR (especificador peripartum); Wisner KL et al.; Osborne LM',
   desc:'EDM con inicio durante el embarazo o en las 4 semanas postparto (criterio DSM-5) o hasta 12 meses postparto (criterio clínico ampliado). Prevalencia 10-15% de gestantes. Impacto en el vínculo materno-filial y el neurodesarrollo del bebé.',
   feats:['Inicio durante el embarazo o en las 4-12 semanas postparto','Ansiedad prominente como síntoma diferencial vs. EDM no perinatal','Pensamientos intrusivos sobre daño al bebé: egodistónicos (≠ psicosis postparto)','Psicosis postparto: emergencia psiquiátrica (1-2/1000 partos); hospitalización urgente','Impacto en vínculo materno-filial y neurodesarrollo del bebé a largo plazo','Alta tasa de infradetección: "blues" postparto normalizado socialmente','Escala de Edimburgo (EPDS): instrumento de cribado de referencia'],
   tx:'TCC e IPT como 1ª línea en formas leves-moderadas; sertralina o paroxetina (datos de seguridad favorables en lactancia); brexanolona IV (Zulresso): 1ª línea específica aprobada FDA 2019 para depresión postparto; TEC en psicosis postparto grave.',
   note:'La brexanolona (derivada de alopregnanolona, neuroesteroide modulator GABA-A) fue el primer tratamiento específicamente diseñado para la depresión perinatal. La psicosis postparto —con riesgo de infanticidio— es una emergencia psiquiátrica que exige hospitalización urgente. La distinción entre pensamientos intrusivos egodistónicos (ansiosa) y egosintónicos (psicótica) es crítica.'},
  // C2
  {id:'drt',n:'Depresión resistente al tratamiento',ab:'DRT',c:2,a:185,cs:'m',
   au:'Thase ME & Rush AJ (1997); CANMAT 2023; Al-Harbi KS',
   desc:'Fracaso a ≥2 ensayos adecuados de AD de clases distintas (dosis terapéutica, ≥6 semanas). Prevalencia: ~30% de los EDM. La primera causa de "resistencia" es la bipolaridad no reconocida tratada con AD en monoterapia.',
   feats:['Criterio mínimo: fracaso a ≥2 AD de clases distintas, a dosis terapéutica y durante ≥6 semanas','Estadiaje: escala Thase-Rush (I-V) o Maudsley Treatment-Resistant Depression Rating Scale','Reevaluación diagnóstica obligatoria: ¿bipolaridad oculta? ¿distimia subyacente? ¿comorbilidad no tratada?','Estrategias de augmentación nivel A: litio, quetiapina, aripiprazol, olanzapina','Esketamina intranasal (Spravato): acción rápida (24-48h); aprobada FDA/EMA en DRT','Ketamina IV: eficacia antisuicida documentada en horas (uso hospitalario)','TEC: eficacia superior a cualquier fármaco en DRT grave (nivel A)'],
   tx:'Augmentación litio (nivel A; el más antiguo y consistente); aripiprazol, quetiapina, olanzapina (nivel A); esketamina intranasal; ketamina IV; TEC; psilocibina (ensayos fase II-III: prometedor); IMAO en formas sin ISRS activo.',
   note:'La reevaluación diagnóstica sistemática antes de escalar es una obligación clínica y medicolegal. La principal causa de "depresión resistente" es la bipolaridad no reconocida con AD en monoterapia que induce ciclación o mixticidad. El litio como augmentación tiene el nivel de evidencia histórico más sólido.'},
  {id:'dsm2',n:'Depresión con síntomas mixtos',ab:'Dep.+sx.mx.',c:2,a:30,cs:'m',
   au:'DSM-5-TR (especificador); Koukopoulos A; Benazzi F; McElroy SL',
   desc:'EDM con ≥3 síntomas hipomaníacos concurrentes (criterio DSM-5) o con agitación + pensamiento acelerado + irritabilidad marcada (criterio Koukopoulos, más sensible). Puente diagnóstico hacia el espectro bipolar. Predictor de bipolaridad.',
   feats:['DSM-5: ≥3 síntomas de hipomanía durante el EDM (sin incluir irritabilidad/distractibilidad/agitación, que son inespecíficos)','Koukopoulos: agitación, pensamiento acelerado, irritabilidad marcada = marcadores más sensibles clínicamente','Mayor riesgo suicida que depresión pura (activación + disforia = perfil de máximo riesgo)','Marcador de bipolaridad subyacente en ~40-50% de casos (estudios BRIDGE)','Peor respuesta y potencial empeoramiento con AD en monoterapia','Frecuente precipitante de urgencias psiquiátricas','Identificar mixticidad = primera línea de prevención de iatrogenia por AD'],
   tx:'Evitar AD en monoterapia. Valproato 1ª línea (eficacia específica en disforia y agitación mixta); quetiapina; litio. BZD a corto plazo para agitación aguda. Si AD es necesario, cubrir con estabilizador.',
   note:'Los criterios de Koukopoulos identifican más pacientes en riesgo de iatrogenia por AD que el especificador DSM-5. El estudio BRIDGE (2011) documentó que >40% de los pacientes diagnosticados de depresión unipolar con síntomas mixtos tenían historia de bipolaridad no diagnosticada.'},
  {id:'sad',n:'Trastorno afectivo estacional (TAE)',ab:'TAE / SAD',c:2,a:160,cs:'m',
   au:'Rosenthal NE et al. Arch Gen Psychiatry 1984; DSM-5-TR (especificador estacional)',
   desc:'Patrón estacional documentable de EDM con remisión espontánea. Clásicamente: depresión otoño-invierno con síntomas atípicos dominantes (hipersomnia, hiperfagia). Fisiopatología circadiana-melatoninérgica.',
   feats:['Relación temporal consistente entre inicio del EDM y la estación (otoño-invierno habitual)','Remisión espontánea con el cambio estacional (primavera-verano)','Síntomas atípicos dominantes: hipersomnia, hiperfagia, letargia, ansia por carbohidratos, aumento ponderal','≥2 episodios estacionales consecutivos sin episodios en otras estaciones','Fisiopatología: desincronización circadiana, alteración del sistema melatoninérgico, retardo de fase','Forma verano (menos frecuente): agitación, insomnio, anorexia, pérdida ponderal','Mayor prevalencia en latitudes altas (Escandinavia, norte de Europa, Canada)'],
   tx:'Fototerapia (10.000 lux, 20-30 min matutinos): eficacia equivalente a ISRS, inicio 3-5 días, sin efectos adversos sistémicos; ISRS (fluoxetina, sertralina: nivel A); agomelatina (mecanismo melatoninérgico: teóricamente idóneo); cronobiología: regularización de rutinas.',
   note:'Rosenthal et al. (1984) describieron originalmente el TAE en la era pre-ISRS. La fototerapia tiene el mejor perfil riesgo-beneficio: eficacia equivalente a los ISRS con inicio más rápido (3-5 días) y sin efectos adversos sistémicos. La fisiopatología circadiana-melatoninérgica hace de la agomelatina una opción farmacológica teóricamente idónea.'},
  {id:'pmdd',n:'Trastorno disfórico premenstrual (TDPM)',ab:'TDPM',c:2,a:142,cs:'m',
   au:'DSM-5-TR; Yonkers KA et al.; Epperson CN; Bäckström T',
   desc:'Síntomas depresivos, ansiosos, irritables y somáticos marcados en la fase lútea final con remisión posmenstrual. Entidad diferenciada del SPM por gravedad e impacto funcional. Sustrato: sensibilidad neuronal diferencial al allopregnanolona (ALOPR).',
   feats:['Síntomas en la fase lútea final con remisión posmenstrual documentada prospectivamente','≥5 síntomas incluyendo obligatoriamente ≥1 síntoma núcleo: labilidad afectiva, irritabilidad/ira, disforia o ansiedad/tensión','Síntomas somáticos: hipersensibilidad mamaria, distensión abdominal, cefalea, fatiga intensa','Deterioro funcional significativo en relaciones interpersonales y laborales','Registro prospectivo ≥2 ciclos: indispensable para confirmación diagnóstica','Sustrato neurobiológico: sensibilidad diferencial a allopregnanolona (GABA-A modulator)','SPQ-TDPM: escala de cribado específica'],
   tx:'ISRS intermitentes (fase lútea) o continuos (sertralina, fluoxetina, escitalopram: nivel A); anticonceptivos hormonales (drospirenona+EE: eficacia documentada, especialmente para síntomas somáticos); agonistas GnRH en formas graves refractarias; brexanolona en investigación.',
   note:'El TDPM ha estado históricamente infravalorado y trivializado a pesar de su impacto funcional documentado. El registro prospectivo de síntomas durante ≥2 ciclos es indispensable para el diagnóstico: la reconstrucción retrospectiva es poco fiable. La sensibilidad diferencial al allopregnanolona explica la fisiopatología y la eficacia de la brexanolona.'},
  {id:'dcog',n:'Depresión con deterioro cognitivo / pseudodemencia',ab:'Dep.cogn.',c:2,a:220,cs:'m',
   au:'Kiloh LG (1961); Alexopoulos GS; Wells CE; DSM-5-TR',
   desc:'EDM con deterioro cognitivo prominente en adultos mayores. Puede preceder, coexistir o simular demencia neurodegenerativa. El seguimiento neuropsicológico a 12 meses es obligatorio.',
   feats:['Deterioro en memoria, atención y velocidad de procesamiento en contexto depresivo','Quejas subjetivas desproporcionadas al rendimiento objetivo en tests (diferencia con demencia real)','Respuesta cognitiva documentable al tratamiento antidepresivo (gold standard diagnóstico retrospectivo)','Puede ser prodrómica de demencia neurodegenerativa: 10-15% a 2 años; 40% a 10 años','Evaluación neuropsicológica serial: MMSE, MoCA, batería neuropsicológica completa','Depresión vascular (Alexopoulos): síndrome depresivo tardío sobre lesiones de sustancia blanca subcortical','Neuroimagen: hipometabolismo frontal bilateral reversible con tratamiento (PET/SPECT)'],
   tx:'AD (vortioxetina: eficacia cognitiva específicamente documentada); TEC en formas graves; inhibidores de AChE si progresa a demencia; seguimiento neuropsicológico obligatorio a 12 meses postremisión.',
   note:'La pseudodemencia depresiva puede ser la primera manifestación de demencia neurodegenerativa subyacente. Alexopoulos definió la "depresión vascular" como síndrome depresivo tardío asociado a lesiones de sustancia blanca subcortical con mayor resistencia al tratamiento y mayor progresión cognitiva.'},
  {id:'danx',n:'Depresión con especificador de angustia / ansiosa',ab:'Dep.ansiosa',c:2,a:40,cs:'m',
   au:'DSM-5-TR (especificador de angustia); Fava M; STAR*D study',
   desc:'EDM con ansiedad prominente en primer plano (tensión, preocupación, incapacidad para relajarse, miedo a perder el control). El especificador de angustia DSM-5 predice mayor riesgo suicida y peor respuesta al tratamiento.',
   feats:['Tensión y nerviosismo marcados durante la mayor parte del episodio','Preocupación excesiva e incontrolable por consecuencias negativas','Incapacidad para relajarse (inquietud psíquica y/o física)','Miedo a que algo terrible pueda suceder','Sensación de perder el autocontrol','Mayor riesgo suicida que EDM sin angustia (STAR*D study)','Mayor resistencia al tratamiento y menor tasa de remisión'],
   tx:'Combinación AD + BZD (a corto plazo para la angustia aguda); IRSN (venlafaxina: eficacia sobre ansiedad y depresión); pregabalina coadyuvante; buspirona como augmentación ansiolitica; TCC (eficaz para el componente ansioso).',
   note:'El estudio STAR*D documentó que la ansiedad comórbida reduce significativamente las tasas de remisión y aumenta el número de ensayos terapéuticos necesarios. La comorbilidad ansiosa en la depresión es la norma (>70%), no la excepción, y exige intervención específica.'},
  {id:'dvascular',n:'Depresión vascular tardía',ab:'Dep.vascular',c:2,a:230,cs:'m',
   au:'Alexopoulos GS et al. Am J Psychiatry 1997; Krishnan KR et al.',
   desc:'Síndrome depresivo de inicio tardío (>60 años) asociado a lesiones cerebrovasculares (leucoaraiosis, lacunas subcorticales). Mayor resistencia farmacológica. Riesgo de demencia vascular.',
   feats:['Inicio tardío (>60 años) sin historia previa de depresión mayor','Neuroimagen: leucoaraiosis (hiperintensidades T2), lacunas subcorticales en ganglios basales y frontal','Mayor retardo psicomotor y deterioro ejecutivo que la depresión no vascular','Mayor resistencia al tratamiento antidepresivo estándar','Elevado riesgo de progresión a demencia vascular en el seguimiento','Factores de riesgo vasculares como predictores (HTA, diabetes, dislipemia, tabaco)','Diferente perfil cognitivo: disfunción ejecutiva > disfunción mnésica'],
   tx:'AD con precaución cardiovascular (ISRS en 1ª línea; tricíclicos evitar); control intensivo de factores de riesgo vascular; aspirina; TEC en formas graves.',
   note:'Alexopoulos et al. (1997) describieron la "hipótesis de la desconexión vascular": las lesiones cerebrovasculares interrumpen los circuitos frontoestriatales implicados en la regulación afectiva, generando un síndrome depresivo de características específicas y mayor resistencia al tratamiento.'},
  // C3
  {id:'sub',n:'Sínd. depresivo subumbral',ab:'Dep.subumbral',c:3,a:175,cs:'m',
   au:'Angst J et al. (estudio longitudinal de Zurich); WHO Global Burden of Disease',
   desc:'Síntomas depresivos clínicamente significativos sin criterios completos para EDM (<5 síntomas o <2 semanas). Mayor prevalencia que la depresión mayor. Impacto funcional comparable a condiciones médicas crónicas.',
   feats:['<5 síntomas depresivos (o <2 semanas) con impacto funcional significativo','Prevalencia-vida en población general: 5-10% (superior al EDM)','Riesgo de EDM completo en seguimiento a 5 años: OR 2.5-4','Impacto funcional comparable a condiciones médicas crónicas (OMS)','Factor de riesgo cardiovascular independiente documentado','Alta infraatención sistémica por ausencia de diagnóstico formal','Instrumentos de cribado: PHQ-9 (puntuación 5-9), K10'],
   tx:'Psicoterapia (TCC, activación conductual, MBCT); intervención en estilo de vida; seguimiento activo.',
   note:'Angst et al. (estudio de Zurich) documentaron que las formas subumbrales tienen mayor prevalencia que la depresión mayor completa y un impacto en calidad de vida comparable. La intervención precoz reduce la conversión a formas completas en un 40-50%.'},
  {id:'rum',n:'Vulnerabilidad ruminativa',ab:'Rumin.',c:3,a:210,cs:'m',
   au:'Nolen-Hoeksema S (1991); Treynor et al. (2003); Wells A (terapia metacognitiva)',
   desc:'Patrón cognitivo de focalización repetitiva y pasiva sobre síntomas depresivos, sus causas y consecuencias. Factor de vulnerabilidad, mantenimiento y recaída con base empírica sólida.',
   feats:['Rumiación brooding (pasiva): foco en síntomas y sus causas; solo esta es patógena','Rumiación reflexión (activa): foco en soluciones; efectos mixtos','Factor predictor de inicio, duración y recurrencia del EDM','Marcador transdiagnóstico: depresión, ansiedad, TEPT, TCA, TUS','Mayor prevalencia en mujeres: contribuye parcialmente a la diferencia de género en depresión','Escala: Ruminative Response Scale (RRS, Nolen-Hoeksema) y Response Styles Questionnaire','Mediador del efecto de eventos vitales sobre el desarrollo del EDM'],
   tx:'MBCT (Mindfulness-Based Cognitive Therapy): nivel I para prevención de recaídas en ≥3 EDM; terapia metacognitiva (Wells A: aborda las metacogniciones que mantienen la rumiación); TCC de segunda generación; ACT.',
   note:'Kuyken et al. (Lancet, 2015) demostraron la equivalencia de la MBCT al mantenimiento con AD en ≥3 EDM. Wells demostró que el tratamiento de las metacogniciones positivas ("la rumiación me ayuda a resolver problemas") y negativas ("la rumiación es incontrolable y peligrosa") produce cambios más estables que la TCC estándar.'},
  {id:'fatdep',n:'Fatiga depresiva y síntomas residuales',ab:'Fat.dep.',c:3,a:195,cs:'m',
   au:'Paykel ES et al.; Nierenberg AA; Fava GA (sintomas residuales)',
   desc:'Fatiga, inhibición cognitiva y anhedonia persistentes tras remisión aparente del EDM. Predictor más potente de recaída temprana según Paykel et al. Fava los denominó "síntomas residuales".',
   feats:['Fatiga y falta de energía como síntomas residuales dominantes (>60% de los pacientes en remisión)','Inhibición cognitiva residual: lentificación del pensamiento, dificultad de concentración','Anhedonia residual: incapacidad persistente para el placer tras remisión del ánimo','Predictor más potente de recaída temprana (Paykel et al.: OR 3-4 vs. remisión completa)','Diferenciable de recaída activa por ausencia de tristeza activa y suficiencia funcional básica','Bupropión y modafinilo: eficacia específica para fatiga residual documentada','Instrumento: QIDS-SR (Quick Inventory of Depressive Symptomatology) para evaluación de residualidad'],
   tx:'Bupropión (noradrenérgico/dopaminérgico: eficacia específica documentada para fatiga residual); modafinilo como adyuvante; activación física estructurada; tratamiento del sueño; estrategias de higiene del sueño.',
   note:'Fava (sintomas residuales) y Paykel demostraron que los síntomas residuales son el predictor más potente de recaída temprana. La remisión sintomática sin recuperación funcional es un objetivo terapéutico insuficiente. El tratamiento de los síntomas residuales reduce la tasa de recaída en un 40-50%.'},
  {id:'dbrec',n:'Dep. breve recurrente',ab:'DBR',c:3,a:335,cs:'m',
   au:'Angst J & Hochstrasser B (1994); Angst J et al. (estudio de Zurich)',
   desc:'Episodios depresivos completos de duración <2 semanas, altamente recurrentes (≥12/año en la forma clásica). Subumbrales para DSM-5 por criterio temporal. CIE-11 los contempla. Alto riesgo suicida.',
   feats:['Duración <2 semanas (subumbral temporal DSM-5) con criterios sintomáticos completos de EDM','≥12 episodios al año en la forma clásica; alta impulsividad','Alto riesgo suicida desproporcionado para la aparente brevedad (comparable al EDM)','CIE-11 contempla esta entidad; DSM-5 la categoriza como depresión no especificada','Prevalencia ~3% en población general (estudio de Zurich)','Solapamiento frecuente con TLP en la presentación clínica','Litio: eficacia específica documentada por Angst para esta forma'],
   tx:'Litio (eficacia específica documentada); evaluación sistemática del espectro bipolar (BSDS); psicoeducación y registro prospectivo de episodios.',
   note:'Angst y Hochstrasser describieron la DBR como una de las presentaciones más frecuentes e ignoradas por los sistemas categoriales. Su alto riesgo suicida contrasta con la aparente levedad por la brevedad episódica. El litio tiene eficacia documentada específica para esta entidad.'},
  {id:'dduelo',n:'Depresión en el duelo / duelo complicado',ab:'Duelo+dep.',c:3,a:165,cs:'m',
   au:'DSM-5-TR (nota metodológica duelo); Shear MK; Zisook S et al.',
   desc:'EDM precipitado por pérdida significativa (duelo). El DSM-5-TR eliminó el "exclusion criterion" del duelo. El duelo complicado (prolongado) se ha incluido en el DSM-5-TR como trastorno de duelo prolongado.',
   feats:['EDM precipitado por pérdida significativa (muerte, divorcio, ruina)','DSM-5-TR: se puede diagnosticar EDM en el duelo si cumple criterios (eliminación del exclusion criterion 2013)','Trastorno de duelo prolongado (DSM-5-TR): nueva entidad, duelo >12 meses con disfunción','Diferencia con duelo normal: deterioro funcional grave, anhedonia global, pensamiento suicida activo','Shear MK: terapia de duelo complicado (TCG) como tratamiento específico','Mayor riesgo en: pérdida de hijo, muerte repentina, historia previa de depresión','Epidemiología: ~10-15% de los dolientes desarrollan duelo prolongado'],
   tx:'Psicoterapia (TCG de Shear: nivel I para duelo complicado; TCC para EDM comórbido); AD si cumple criterios completos de EDM; evitar BZD prolongadas (inhiben la elaboración del duelo).',
   note:'La eliminación del "bereavement exclusion" en el DSM-5 (2013) fue uno de los cambios más debatidos. Zisook et al. argumentan que el EDM en el duelo requiere tratamiento igualmente. El trastorno de duelo prolongado (incorporado en DSM-5-TR 2022) reconoce finalmente la entidad del duelo complicado.'},
  // C4
  {id:'endog',n:'Depresión endógena (constructo histórico)',ab:'Dep.endóg.',c:4,a:192,cs:'l',
   au:'Gillespie RD (1929); Mapother E (1926); revisiones en American Journal of Psychiatry',
   desc:'Concepto histórico para depresión sin desencadenante ambiental identificable, con síntomas melancólicos prominentes. Abandonado como categoría en DSM-III (1980). Parcialmente recogido por el especificador melancólico.',
   feats:['Sin desencadenante ambiental identificable (origen supuestamente biológico-endógeno)','Síntomas melancólicos como correlato clínico habitual','Abandonado en DSM-III (1980): desplazado por el especificador melancólico','Dicotomía endógena/reactiva: base de la nosología clásica pre-DSM-III','Relevancia histórica para el debate sobre heterogeneidad biológica depresiva','Investigación en biomarcadores: intenta recuperar su valor predictivo y terapéutico','Neuroimagen funcional y metabolómica: nuevos intentos de operacionalización'],
   tx:'Conceptualmente orienta hacia AD noradrenérgico y TEC. Sin evidencia específica por ausencia de criterios operacionales vigentes.',
   note:'La dicotomía endógena/reactiva fue abandonada en DSM-III (1980) pero su legado persiste en el debate sobre heterogeneidad biológica depresiva. La investigación en biomarcadores (inflamación, cortisol, neuroimagen) intenta recuperar su valor predictivo y terapéutico con nuevos instrumentos.'},
  {id:'melinv',n:'Melancolía involutiva (Kraepelin)',ab:'M.involut.',c:4,a:215,cs:'l',
   au:'Emil Kraepelin (Psychiatrie, 8ª ed., 1913); Roth M (1955)',
   desc:'Depresión de inicio tardío (>40-50 años) con agitación prominente y ansiedad severa. Kraepelin la diferenció de la PMD en su nosología tardía. Eliminada del DSM-III (1980). Zona de frontera con bipolaridad tardía agitada.',
   feats:['Inicio tardío: cuarta a quinta décadas o posterior','Agitación psicomotriz intensa y ansiedad severa como síntomas dominantes','Diferenciada de la PMD por Kraepelin en la 8ª edición de Psychiatrie','Eliminada del DSM-III (1980) por ausencia de validación empírica suficiente','Zona de frontera entre melancólico tardío y espectro bipolar de inicio tardío','Roth (1955): la diferenció de la psicosis afectiva tardía','Relevancia conceptual para la heterogeneidad de la depresión de inicio tardío'],
   tx:'AD + antipsicóticos a dosis bajas en formas agitadas; TEC de primera elección en formas graves; la agitación orienta a cobertura estabilizadora.',
   note:'Su eliminación en 1980 fue metodológicamente discutible. La herencia conceptual es relevante para la heterogeneidad del espectro depresivo tardío y la frontera entre depresión tardía agitada y espectro bipolar de inicio tardío con debut depresivo.'},
  {id:'denmsc',n:'Depresión enmascarada / equivalentes depresivos',ab:'Dep.enmsc.',c:4,a:315,cs:'l',
   au:'Lesse S (1974); Lopez-Iбor Alino JJ (1972); historia nosológica internacional',
   desc:'Concepto histórico para síndromes somáticos o conductuales que ocultan una depresión subyacente. Especialmente relevante en atención primaria, medicina interna y culturas con menor expresión afectiva verbal.',
   feats:['Presentación somática principal sin quejas depresivas espontáneas del paciente','Equivalentes somáticos: dolor crónico, cefaleas, fatiga, somatizaciones, disfunciones sexuales','Respuesta a AD como criterio diagnóstico retrospectivo (gold standard histórico)','Mayor prevalencia en culturas con menor expresión afectiva verbal (Asia, Latinoamérica)','Lopez-Ibor Alino (1972): sistematizó el concepto en España','>50% de las depresiones en atención primaria se presentan con síntomas somáticos dominantes','IRSN: eficacia específica para el componente doloroso'],
   tx:'AD con perfil noradrenérgico (IRSN específicamente eficaces para componente doloroso); abordaje interdisciplinar con medicina interna.',
   note:'El concepto sigue siendo clínicamente útil en atención primaria y medicina interna para identificar depresiones con presentación somática dominante. La respuesta al AD confirma el diagnóstico retrospectivamente. Esencial en el diagnóstico diferencial del síndrome de fatiga crónica y la fibromialgia.'},
 ]},

 entities:[
  {id:'tb1',n:'Trastorno Bipolar I',ab:'TB I',c:1,a:345,cs:'h',
   au:'DSM-5-TR (APA, 2022) / CIE-11 (OMS, 2019)',
   desc:'Definido por la presencia de al menos un episodio maníaco pleno (criterios A–D DSM-5-TR), habitualmente acompañado de episodios depresivos mayores (no obligatorios para el diagnóstico). Es la presentación más reconocible del espectro bipolar, con alto riesgo de recurrencia, hospitalización y comorbilidad.',
   feats:['Episodio maníaco pleno: estado de ánimo elevado/irritable + aumento de actividad ≥7 días (criterios A–D)','Hospitalización o intervención urgente en episodios graves o con psicosis','Episodios depresivos habituales pero no definitorios del diagnóstico','Especificadores: mixto, psicótico, catatónico, peripartum, estacional','Alto riesgo de recurrencia: >90% presenta ≥1 nuevo episodio en seguimiento a 5 años'],
   tx:'Litio (1ª línea en mantenimiento, nefroprotección, antisuicida documentada); valproato; quetiapina, aripiprazol, lurasidona (fase depresiva); olanzapina (manía aguda). TEC en manía refractaria o catatónica. Evitar AD en monoterapia.',
   note:'La distinción TB I/TB II no implica jerarquía de gravedad. El TB I tiene mayor riesgo de episodios psicóticos y hospitalización; el TB II, mayor carga depresiva longitudinal y riesgo suicida. La evaluación longitudinal y no solo transversal es indispensable para el diagnóstico.'},
  {id:'tb2',n:'Trastorno Bipolar II',ab:'TB II',c:1,a:170,cs:'h',
   au:'DSM-5-TR / CIE-11; Judd et al., Am J Psychiatry, 2003',
   desc:'Al menos un episodio hipomaníaco (criterios A–F, ≥4 días) y al menos un episodio depresivo mayor, sin manía plena en ningún momento del curso. La carga depresiva longitudinal es mayor que en el TB I; el diagnóstico suele retrasarse 7–10 años desde el inicio clínico.',
   feats:['Hipomanía: ≥4 días, sin hospitalización ni disfunción grave (criterio F)','Sin manía plena en ningún punto del curso evolutivo','Mayor porcentaje de tiempo en depresión que en hipomanía (Judd et al.)','Alta tasa de diagnóstico inicial erróneo como depresión unipolar (>60%)','Riesgo suicida igual o superior al TB I'],
   tx:'Quetiapina (evidencia 1ª línea en depresión bipolar); litio; lamotrigina (mantenimiento, especialmente en fase depresiva); lurasidona. Cautela con AD en monoterapia: riesgo de viraje o ciclación.',
   note:'El TB II no debe considerarse "más leve" que el TB I. Judd et al. (2003) documentaron que los pacientes con TB II pasan ~50% del tiempo en depresión frente a ~11% en hipomanía. El impacto funcional y la mortalidad son comparables o peores que en TB I.'},
  {id:'cicl',n:'Ciclotimia',ab:'Cicl.',c:1,a:80,cs:'h',
   au:'Kahlbaum (1882); DSM-5-TR / CIE-11; Van Meter et al., Bipolar Disord, 2011',
   desc:'Patrón crónico (≥2 años en adultos, ≥1 año en menores) de síntomas hipomaníacos y depresivos subumbrales alternantes, sin episodios plenos en los primeros 2 años de evolución. Tasa de conversión a TB I/II: 15–50% en seguimientos longitudinales.',
   feats:['Síntomas hipomaníacos y depresivos subumbrales sin llegar a episodios plenos','≥2 años de duración en adultos (≥1 año en menores de edad)','Sin episodios plenos en los primeros 2 años de evolución','Conversión a TB I/II: 15–50% en seguimiento a largo plazo','Altamente infradetectada en atención primaria y psiquiatría general'],
   tx:'Litio a dosis bajas (0.6–0.8 mEq/L); psicoeducación intensiva; IPSRT (Interpersonal and Social Rhythm Therapy); monitorización longitudinal estrecha con registro de estado de ánimo.',
   note:'La ciclotimia es con frecuencia el estado prodrómico de la bipolaridad plena. La intervención psicoeducativa y la IPSRT precoz tienen la mejor base empírica para reducir la tasa de conversión. No debe minimizarse clínicamente por su aparente subumbralidad.'},
  {id:'mxto',n:'Episodio con características mixtas',ab:'Ep.mx.',c:1,a:260,cs:'h',
   au:'DSM-5-TR (APA, 2022); Koukopoulos et al., J Affect Disord, 2013',
   desc:'Especificador de episodio aplicable a maníacos, hipomaníacos o depresivos cuando coexisten ≥3 síntomas del polo opuesto de forma simultánea. Supone mayor riesgo suicida, peor respuesta a antidepresivos y mayor complejidad terapéutica.',
   feats:['≥3 síntomas del polo opuesto presentes durante el episodio actual','Aplicable a episodios maníacos, hipomaníacos y depresivos por igual','Mayor riesgo suicida que episodios puros de cualquier polaridad','Peor respuesta a AD cuando el componente depresivo es dominante','Sustituyó al "episodio mixto" como tipo en DSM-IV'],
   tx:'Evitar AD en monoterapia. Estabilizadores (valproato 1ª línea por su eficacia en disforia y agitación; litio); antipsicóticos atípicos (quetiapina, olanzapina, lurasidona). BZD a corto plazo para la agitación.',
   note:'El umbral de 3 síntomas del DSM-5 infraidentifica la mixticidad clínica real. Los criterios de Koukopoulos (que incluyen la agitación y el pensamiento acelerado como marcadores positivos de manía sobre fondo depresivo) tienen mayor sensibilidad en la práctica ambulatoria.'},
  {id:'bp2h',n:'BP II½: depresión atípica bipolar',ab:'BP II½',c:2,a:145,cs:'m',
   au:'Akiskal & Pinto, 1999; Perugi et al., J Affect Disord, 1998',
   desc:'Episodios depresivos mayores con características atípicas (hipersomnia, hiperfagia, parálisis del plomo, hipersensibilidad interpersonal al rechazo) sobre un sustrato del espectro bipolar. La depresión atípica tiene alta prevalencia en el espectro bipolar según Akiskal y Perugi.',
   feats:['Hipersomnia ≥10 horas o hipersomnia diurna marcada','Hiperfagia, ansia por carbohidratos, aumento ponderal reactivo','Parálisis del plomo: sensación física de pesadez en extremidades','Hipersensibilidad interpersonal al rechazo como rasgo persistente','Reactividad del ánimo conservada ante eventos positivos'],
   tx:'ISRS con cautela; litio (eficacia documentada); IMAO en formas graves o refractarias (clásicamente considerados de elección). Evitar AD tricíclicos como monoterapia si hay marcadores bipolares concomitantes.',
   note:'La depresión atípica es el subtipo depresivo con mayor prevalencia en el espectro bipolar. Su reconocimiento reorienta las estrategias farmacológicas de forma decisiva, especialmente evitando los tricíclicos como primera línea en presencia de marcadores bipolares.'},
  {id:'bp3',n:'BP III: viraje por antidepresivos',ab:'BP III',c:2,a:325,cs:'m',
   au:'Akiskal & Pinto, Psychiatr Clin North Am, 1999; Ghaemi et al., J Psychiatr Pract, 2002',
   desc:'Hipomanía o manía inducida por antidepresivos en paciente con depresión tratada, sin episodios espontáneos previos documentados. Se interpreta como marcador de vulnerabilidad bipolar subyacente que los AD han "delatado" más que creado.',
   feats:['Hipomanía/manía precipitada por AD, sin episodios espontáneos previos','Mayor frecuencia con tricíclicos > IRSN > ISRS > IMAO','El valor diagnóstico aumenta con historia familiar de TB en primer grado','No incluido como categoría formal en DSM-5, pero sí relevante clínicamente','Debe orientar a reevaluación diagnóstica completa del espectro'],
   tx:'Suspensión o reducción del AD precipitante; introducción de estabilizador del ánimo; reevaluación diagnóstica integral. Gestión del riesgo de ciclación acelerada inducida.',
   note:'Debate persistente: ¿refleja bipolaridad genuina o es una respuesta farmacológica independiente del sustrato? El consenso actual (ISBD, CANMAT) tiende a interpretarlo como marcador de espectro bipolar subyacente, especialmente si hay agregación familiar.'},
  {id:'bp3b',n:'BP IIIb: hipomanía breve recurrente',ab:'BP IIIb',c:2,a:40,cs:'m',
   au:'Angst et al., Arch Gen Psychiatry, 2003; estudio longitudinal de Zurich',
   desc:'Episodios hipomaníacos de duración inferior a 4 días (subumbrales para DSM-5), recurrentes y diferenciables del estado basal habitual del sujeto. Identificados sistemáticamente en el estudio longitudinal de Zurich y en el estudio BRIDGE-II-Mix.',
   feats:['Duración <4 días: no cumple criterio temporal DSM-5 para hipomanía','Recurrencia documentada que distingue del estado basal','Impacto funcional variable pero frecuentemente significativo','Prevalentes en el estudio de Zurich (Angst); subrepresentados en muestras clínicas','CIE-11 contempla mejor estas formas subumbrales que el DSM-5-TR'],
   tx:'Manejo similar al TB II; cautela con AD en monoterapia; litio o estabilizadores si hay impacto funcional claro; psicoeducación sobre reconocimiento de síntomas.',
   note:'La brevedad episódica no implica menor relevancia clínica. Muchos pacientes que después cumplen criterios de TB II inician con hipomanías breves recurrentes. La anamnesis longitudinal estructurada y el registro de estado de ánimo son fundamentales para capturarlos.'},
  {id:'bp4',n:'BP IV: depresión hipertímica',ab:'BP IV',c:2,a:185,cs:'m',
   au:'Akiskal & Pinto, Psychiatr Clin North Am, 1999; Cassano et al.',
   desc:'Episodio depresivo mayor que emerge sobre una línea de base temperamental hipertímica, sin hipomanía documentada en ningún momento del curso. Frecuentemente diagnosticado de forma errónea como depresión unipolar, con el consiguiente riesgo de prescripción de AD sin cobertura estabilizadora.',
   feats:['Temperamento hipertímico como línea de base constitucional del sujeto','EDM sobre fondo hipertímico sin hipomanía clásica documentada','La depresión es el síntoma de consulta; el polo elevado es el sustrato temperamental','Alta tasa de infradiagnóstico como depresión unipolar en atención primaria','Riesgo significativo de iatrogenia con AD: activación, agitación, ciclación'],
   tx:'Cautela con AD, especialmente en monoterapia. Evaluación temperamental sistemática mediante TEMPS-A. Considerar estabilizadores del ánimo como primer paso según el impacto funcional y los antecedentes familiares.',
   note:'Invierte la lógica habitual de la bipolaridad: la depresión es la manifestación clínica sobre un polo opuesto temperamental, no episódico. El concepto tiene un valor preventivo directo de iatrogenia farmacológica y orienta hacia una terapéutica más conservadora con AD.'},
  {id:'vcir',n:'Vulnerabilidad circadiana',ab:'V.circ.',c:2,a:50,cs:'m',
   au:'Harvey et al., J Clin Psychiatry, 2005; Frank et al., Am J Psychiatry, 2005 (IPSRT)',
   desc:'Sensibilidad aumentada a la desregulación de los ritmos circadianos como sustrato neurobiológico de la vulnerabilidad bipolar. Nexo entre el eje HPA, el sistema melatoninérgico y la estacionalidad de los episodios afectivos. Base de la IPSRT.',
   feats:['Irregularidad del ritmo sueño-vigilia como rasgo constitucional','Estacionalidad documentable de episodios afectivos (otoño/primavera)','Sensibilidad a cambios de turno laboral y viajes intercontinentales','Nexo con eje HPA, BDNF y sistema melatoninérgico (evaluable con MEQ, PSQI)','El ciclo circadiano como regulador del humor en el espectro bipolar'],
   tx:'IPSRT (Interpersonal and Social Rhythm Therapy, Frank et al.) como primera línea no farmacológica; agomelatina como opción farmacológica complementaria; melatonina de liberación prolongada; regularización estricta de rutinas sociales y horarios.',
   note:'Frank et al. (2005) demostraron la superioridad de la IPSRT sobre el tratamiento estándar para la estabilización a largo plazo, especialmente en TB II. La regularización de los ritmos sociales es un componente terapéutico activo, no meramente higiénico.'},
  {id:'sens_ad',n:'Sensibilidad a AD / Marcadores de vulnerabilidad bipolar',ab:'M.vuln.bip.',c:2,a:155,cs:'m',
   au:'Ghaemi SN et al. (BSDS) J Clin Psychiatry 2002; ISBD guidelines',
   desc:'Constelación de indicadores clínico-anamnésicos que aumentan la probabilidad pre-test de espectro bipolar. Operacionalizados en la Bipolar Spectrum Diagnostic Scale (BSDS) de Ghaemi et al.',
   feats:['Viraje a hipomanía/manía con AD (especialmente tricíclicos y IRSN)','Historia familiar de TB en primer o segundo grado','Inicio precoz del primer episodio depresivo (<25 años)','≥3 episodios depresivos mayores en historia vital','Psicosis durante episodio depresivo o mixto','Ciclación acelerada inducida o mantenida por AD','BSDS: instrumento validado en español; sensibilidad 75%, especificidad 80% para espectro bipolar'],
   tx:'Evaluación longitudinal estructurada; cautela con AD; aplicar BSDS sistemáticamente; psicoeducación activa.',
   note:'La BSDS (Ghaemi et al., 2002) es el instrumento más operacionalizado para la detección sistemática de vulnerabilidad bipolar en contexto clínico. Cada marcador positivo adicional aumenta la probabilidad pre-test de espectro bipolar de forma acumulativa.'},
  {id:'hvulest',n:'Vulnerabilidad al estrés psicosocial (kindling)',ab:'Vuln.estres',c:2,a:95,cs:'m',
   au:'Post RM (kindling, 1992); Monroe SM & Harkness KL (2005)',
   desc:'Sensibilidad aumentada a eventos vitales estresantes como desencadenantes de episodios afectivos bipolares. El modelo de kindling de Post propone una sensibilización progresiva del sistema límbico a lo largo de la vida.',
   feats:['Eventos vitales como desencadenantes principales en las fases precoces del TB','Kindling (Post, 1992): sensibilización progresiva del sistema límbico con cada episodio','Episodios tardíos pueden volverse autónomos sin estresores identificables','Interacción gen-ambiente documentada: BDNF val66met, eje HPA, carga alostática','Evaluable con Holmes-Rahe Stress Scale (SRRS) o Life Events Survey (LES)','Implica que la intervención precoz es más eficaz: previene la autonomización de los episodios','Modelo neurobiológico: kindling eléctrico en núcleos amígdala/hipocampo como analogía'],
   tx:'IPSRT; TCC; reducción sistematizada de estresores; apoyo social estructurado; estrategias de regulación emocional; litio (modifica neuroplasticidad y resistencia al kindling).',
   note:'El modelo de kindling de Post (1992) es el fundamento teórico más sólido para la indicación de tratamiento preventivo precoz tras el primer o segundo episodio bipolar. La prevención de los primeros episodios reduce la carga longitudinal antes de que los episodios se autonomicen.'},
  {id:'hsue',n:'Hipersensibilidad a privación de sueño',ab:'S.sueño',c:2,a:38,cs:'m',
   au:'Wehr et al., Arch Gen Psychiatry, 1987; Colombo et al., Bipolar Disord, 1999',
   desc:'Tendencia constitucional a desarrollar activación, euforia o hipomanía ante privación o reducción significativa del sueño. Marcador accesible de vulnerabilidad circadiana en el espectro bipolar, con especial relevancia en contextos de chemsex y consumo de estimulantes.',
   feats:['Activación, euforia o hipomanía ante privación de sueño ≥24 horas','Precipitado por jet lag intercontinental, trabajo a turnos nocturnos y estimulantes','Marcador de vulnerabilidad circadiana accesible mediante anamnesis','Especialmente relevante en NPS y chemsex (GHB, mefedrona, MDMA, estimulantes)','La privación de sueño como "test diagnóstico natural" inadvertido'],
   tx:'Higiene del sueño estricta como primera medida; melatonina de liberación prolongada; vigilancia reforzada en viajes intercontinentales; psicoeducación sobre riesgo en contextos de consumo.',
   note:'En el contexto de chemsex y NPS, la privación de sueño actúa como precipitante potente de episodios hipomaníacos, mixtos o maníacos en sujetos con vulnerabilidad espectral. La detección de este marcador es parte de la evaluación estándar en pacientes consumidores de estimulantes con historia afectiva.'},
  {id:'floa',n:'Floater afectivo / oscilaciones interepisódicas',ab:'Floater',c:2,a:85,cs:'m',
   au:'Akiskal HS; revisiones en Bipolar Disord',
   desc:'Oscilaciones afectivas subumbrales en los intervalos interepisódicos que señalan que la bipolaridad no es puramente episódica sino una condición de vulnerabilidad continua. Cuestionan el modelo de eutimia plena entre episodios en una proporción significativa de pacientes.',
   feats:['Oscilaciones subumbrales en intervalos interepisódicos documentables','Diferenciables del estado eutímico pleno con registro sistemático de estado de ánimo','Más frecuentes en TB II que en TB I según estudios longitudinales','Relevancia funcional y terapéutica directa: no implican necesariamente cambio de tratamiento pero sí vigilancia','Subreconocidas en práctica clínica por ausencia de escalas específicas breves'],
   tx:'Mantener tratamiento de mantenimiento continuo; no suspender prematuramente ante aparente eutimia; registro sistemático del estado de ánimo como herramienta de monitorización.',
   note:'El concepto cuestiona el modelo de la bipolaridad como condición puramente episódica. La evidencia longitudinal sugiere que muchos pacientes con TB II presentan oscilaciones continuas de baja amplitud que mantienen la vulnerabilidad y el impacto funcional entre los episodios formalmente definidos.'},
  {id:'smix',n:'Síntomas mixtos breves recurrentes',ab:'S.mx.br.',c:2,a:258,cs:'m',
   au:'Angst et al.; Benazzi, Bipolar Disord, 2004',
   desc:'Episodios breves (horas a pocos días) de síntomas maníacos o hipomaníacos sobre fondo depresivo persistente, recurrentes y habitualmente ego-distónicos. Probablemente la forma de presentación mixta más frecuente en la práctica ambulatoria.',
   feats:['Duración breve: de horas a pocos días','Síntomas maníacos/hipomaníacos subsindromáticos sobre fondo depresivo','Recurrentes y con patrón reconocible por el paciente en retrospectiva','Habitualmente ego-distónicos: el paciente los vive como intrusivos y disruptivos','Alta tasa de infradiagnóstico en APS y psiquiatría general'],
   tx:'Estabilizadores del ánimo (valproato, litio); evitar AD en monoterapia; psicoeducación sobre el reconocimiento del patrón mixto.',
   note:'Son probablemente la presentación más frecuente del espectro mixto en atención primaria. Su reconocimiento es la primera línea de prevención de iatrogenia por antidepresivos. La anamnesis prospectiva mediante registro de estado de ánimo facilita enormemente su detección.'},
  {id:'hdis',n:'Hipomanía disfórica',ab:'H.disf.',c:3,a:268,cs:'m',
   au:'Akiskal HS; Benazzi F, Bipolar Disord, 2007',
   desc:'Estado hipomaníaco con predominio de disforia, irritabilidad y tensión interna en lugar de euforia. Presentación frecuente en la práctica ambulatoria, con alta tasa de confusión diagnóstica con trastorno de ansiedad, TDAH o TLP.',
   feats:['Activación psicomotriz con disforia predominante (no euforia)','Irritabilidad marcada como síntoma principal','Pensamiento acelerado de carácter disfórico (no placentero)','Frecuente en cicladores rápidos y TB II','Habitualmente ego-distónica: facilita la consulta pero enmascara el diagnóstico'],
   tx:'Estabilizadores del ánimo (valproato, litio); antipsicóticos atípicos (quetiapina); evitar AD en monoterapia. La disforia como síntoma dominante no debe orientar erróneamente hacia AD.',
   note:'La hipomanía disfórica es probablemente la presentación hipomaníaca más frecuente en clínica ambulatoria. El carácter ego-distónico facilita la consulta pero puede conducir a un diagnóstico erróneo de depresión agitada o ansiedad generalizada con prescripción inadecuada de AD.'},
  {id:'emsu',n:'Estados mixtos subumbrales',ab:'E.mx.s.',c:3,a:295,cs:'m',
   au:'Benazzi F, Bipolar Disord, 2004; Koukopoulos A',
   desc:'Coexistencia de síntomas maníacos/hipomaníacos y depresivos sin alcanzar umbrales categoriales para ningún episodio definido. Probablemente las presentaciones más frecuentes del espectro bipolar en la práctica clínica real.',
   feats:['Síntomas de ambos polos presentes simultáneamente sin criterios episódicos completos','Mayor frecuencia que episodios puros en muestras de psiquiatría ambulatoria (Benazzi)','Asociados a peor pronóstico funcional y mayor riesgo suicida que episodios puros','Base conceptual de las operacionalizaciones de Koukopoulos y Akiskal','No capturados adecuadamente por los sistemas categoriales DSM-5/CIE-11'],
   tx:'Estabilizadores del ánimo; evitar AD; psicoeducación intensiva sobre reconocimiento de mixticidad.',
   note:'Benazzi y Koukopoulos argumentaron que los estados mixtos subumbrales son la norma clínica, no la excepción. Su infradiagnóstico masivo es la causa principal de prescripción inadecuada de AD en espectro bipolar. Son la forma de presentación más frecuente en psiquiatría ambulatoria y APS.'},
  {id:'dmko',n:'Depresión mixta (Koukopoulos)',ab:'D.mx.K.',c:3,a:268,cs:'m',
   au:'Koukopoulos A et al., J Affect Disord, 2013',
   desc:'Episodio depresivo mayor con al menos 3 síntomas hipomaníacos concurrentes según los criterios de Koukopoulos, que incluyen específicamente el pensamiento acelerado, la irritabilidad y la agitación como marcadores positivos de manía sobre fondo depresivo.',
   feats:['EDM completo + ≥3 síntomas hipomaníacos concurrentes','Pensamiento acelerado o vuelo de ideas disfórico','Irritabilidad marcada durante el episodio depresivo','Agitación psicomotriz como síntoma cardinal','Mayor sensibilidad para detectar mixticidad que el especificador DSM-5'],
   tx:'Estabilizadores del ánimo (valproato 1ª línea por eficacia específica en disforia y agitación; litio); quetiapina; evitar AD en monoterapia.',
   note:'Los criterios de Koukopoulos identifican más pacientes en riesgo de iatrogenia por AD que el especificador de "características mixtas" del DSM-5. Su aplicación sistemática en la práctica clínica reduce significativamente el riesgo de prescripción inadecuada en la depresión bipolar mixta.'},
  {id:'crapid',n:'Ciclado rápido (≥4 ep./año)',ab:'Cic.ráp.',c:3,a:252,cs:'h',
   au:'DSM-5-TR (especificador de curso); Dunner DL & Fieve RR Am J Psychiatry 1974',
   desc:'Especificador de curso: ≥4 episodios afectivos plenos en 12 meses. Mayor resistencia farmacológica. Asociado a hipotiroidismo subclínico, TUS y uso activo de AD.',
   feats:['≥4 episodios afectivos plenos (maníacos, hipomaníacos, mixtos o depresivos) en 12 meses','Mayor prevalencia en mujeres (3:1 respecto a hombres)','Asociación con hipotiroidismo subclínico: evaluar TSH sistemáticamente','Frecuente asociación con TUS activo y uso activo o reciente de AD','Peor pronóstico funcional y resistencia farmacológica relativa al tratamiento estándar','El CR no siempre es estable: alternancia frecuente con fases de ciclación más lenta','Evaluación mandatoria de factores precipitantes modificables antes de escalar tratamiento'],
   tx:'Valproato (1ª línea específica para CR; nivel A); carbamazepina (2ª línea); suprimir AD activos; evaluar y tratar hipotiroidismo; reducir consumo de sustancias; clonazepam coadyuvante para la agitación.',

  {id:'labaf',n:'Labilidad afectiva',ab:'Lab.af.',c:3,a:70,cs:'m',

  {id:'bipsft',n:'Bipolaridad suave (soft bipolar)',ab:'Bip.suave',c:3,a:120,cs:'m',

  {id:'tempht',n:'Temperamento hipertímico',ab:'T.hipert.',c:3,a:358,cs:'m',

   feats:['Inicio agudo (horas a días)','Polimorfismo sintomático: cambios frecuentes de síntomas','Pronóstico excelente: autolimitada y sin deterioro longitudinal','Naturaleza afectiva dominante','Tres tipos leonhardianos: de la motilidad, de la confusión, de la ansiedad-felicidad','Mejor pronóstico global que la esquizofrenia','Excelente respuesta al litio (prevención) y al TEC (tratamiento agudo grave)'],
   tx:'Litio (prevención de recurrencias); antipsicóticos a corto plazo en fase aguda; TEC de alta eficacia documentada.',
   note:'La psicosis cicloide es el arquetipo de entidad puente entre espectro bipolar y psicótico. Mejor pronóstico global que la esquizofrenia. Central para la fenomenología psiquiátrica clásica y para la comprensión del continuo psicótico-afectivo.'},
  {id:'psanxfel',n:'Psicosis de ansiedad-felicidad (Leonhard)',ab:'Ps.anx-fel.',c:2,a:250,cs:'l',
   au:'K. Leonhard Aufteilung der endogenen Psychosen (1957)',
   desc:'Uno de los tres tipos leonhardianos de psicosis cicloide. Oscilaciones entre estados de ansiedad intensa y de felicidad extática, con alucinaciones y delirios cambiantes según el polo afectivo dominante.',
   feats:['Oscilación entre ansiedad intensa y felicidad extática como polos del episodio','Alucinaciones y delirios de contenido cambiante según el polo afectivo dominante','Ideas de referencia, de influencia y de grandeza en el polo de felicidad','Terror, catastrofismo y delirios nihilistas en el polo de ansiedad','Inicio agudo y resolución completa entre episodios (sin deterioro)','Pronóstico excelente: sin deterioro longitudinal ni sintomatología residual','Su reconocimiento evita el sobrediagnóstico de esquizofrenia'],
   tx:'Litio (prevención de recurrencias); antipsicóticos a corto plazo; benzodiacepinas para la ansiedad aguda.',
   note:'El subtipo ansiedad-felicidad es el más fácilmente diferenciable de la esquizofrenia por la naturaleza marcadamente afectiva de los síntomas psicóticos y el excelente pronóstico. Su reconocimiento es clave para evitar la prescripción de antipsicóticos a largo plazo innecesariamente.'},
  {id:'psconf',n:'Psicosis confusional (Leonhard)',ab:'Ps.confus.',c:2,a:290,cs:'l',
   au:'K. Leonhard Aufteilung der endogenen Psychosen (1957)',
   desc:'Tipo leonhardiano de psicosis cicloide: confusión marcada con pensamiento desordenado, incoherencia y perplejidad, oscilando entre exaltación confusa y estupor confuso.',
   feats:['Confusión y perplejidad como síntomas dominantes','Pensamiento incoherente y desorganizado sin sistematización delirante clara','Oscilación entre exaltación confusa y estupor confuso','Desorientación relativa (leve, sin la profundidad del delirium orgánico)','Inicio agudo y resolución completa sin deterioro residual','Diagnóstico diferencial obligatorio: descartar siempre causa orgánica (delirium)','Pronóstico excelente si se confirma la naturaleza cicloide'],
   tx:'Antipsicóticos a corto plazo; litio en formas recurrentes; descartar siempre causas orgánicas.',
   note:'El diagnóstico diferencial con delirium orgánico es obligatorio y prioritario. La ausencia de causa médica identificable y el inicio en contexto afectivo claro orientan hacia la psicosis confusional cicloide.'},
  {id:'psmotil',n:'Psicosis de la motilidad (Leonhard)',ab:'Ps.motil.',c:2,a:230,cs:'l',
   au:'K. Leonhard Aufteilung der endogenen Psychosen (1957)',
   desc:'Tipo leonhardiano de psicosis cicloide. Alteraciones prominentes de la motilidad entre hipercinesia excitada y acinesia inhibida con componente afectivo.',
   feats:['Hipercinesia excitada: agitación, inquietud, movimientos repetitivos','Acinesia inhibida: mutismo, inmovilidad, postura rígida (símil catatónico)','Oscilación entre los dos polos motores en el mismo episodio','Componente afectivo presente (euforia en hipercinesia, tristeza en acinesia)','Diferenciable de catatonia: el componente afectivo y el inicio agudo son la clave','Resolución completa entre episodios sin deterioro'],
   tx:'TEC (primera elección si hay síntomas catatónicos o graves); litio en recurrentes; benzodiacepinas IV en catatonia aguda.',
   note:'La psicosis de la motilidad puede ser difícil de distinguir de la catatonia en la fase aguda. El TEC es el tratamiento de primera elección cuando hay síntomas catatónicos prominentes. La resolución completa entre episodios y la naturaleza afectiva del cuadro orientan hacia el diagnóstico cicloide.'},
  {id:'psaf',n:'Psicosis afectiva aguda',ab:'Ps.af.ag.',c:2,a:205,cs:'m',
   au:'Nosología clásica; CIE-10 (F23); Perris C',
   desc:'Psicosis con componente afectivo dominante, inicio agudo y buen pronóstico. Zona de frontera clínica entre EDM psicótico y psicosis cicloide. Su reconocimiento evita el sobrediagnóstico de esquizofrenia.',
   feats:['Componente afectivo dominante (euforia intensa o disforia grave)','Inicio agudo','Buen pronóstico episódico','Zona de frontera clínica: EDM psicótico ↔ psicosis cicloide','Alta respuesta a la combinación estabilizador + antipsicótico','Su reconocimiento evita el sobrediagnóstico de esquizofrenia'],
   tx:'Estabilizadores + antipsicóticos; TEC si refractaria.',
   note:'Categoría clínicamente útil para presentaciones de frontera difícil de clasificar entre EDM psicótico y psicosis cicloide. Su reconocimiento evita el sobrediagnóstico de esquizofrenia y la prescripción innecesaria de antipsicóticos a largo plazo.'},
  {id:'psmx',n:'Episodio mixto-psicótico',ab:'Ep.mx.psic.',c:2,a:248,cs:'m',
   au:'Nosología dimensional; Toni C et al.',
   desc:'Episodio mixto (criterios DSM-5 o Koukopoulos) con síntomas psicóticos congruentes o no congruentes. Alto riesgo suicida por la combinación activación + disforia + psicosis.',
   feats:['Síntomas mixtos bipolares + componente psicótico simultáneo','Síntomas psicóticos frecuentemente no congruentes con el estado de ánimo','Alto riesgo suicida: activación + disforia + psicosis = perfil de máximo riesgo','Zona de frontera con TEA bipolar: requiere seguimiento longitudinal','Hospitalización indicada en la mayoría de los casos','TEC: alta eficacia en formas graves'],
   tx:'Estabilizadores + antipsicóticos; TEC en formas graves con riesgo vital; BZD a corto plazo para la agitación aguda.',
   note:'La combinación de mixticidad y psicosis eleva exponencialmente el riesgo suicida. Requiere hospitalización en la mayoría de los casos y tratamiento combinado desde el inicio.'},
  {id:'psbreve',n:'Psicosis breve polimorfa',ab:'Ps.br.pol.',c:2,a:305,cs:'m',
   au:'DSM-5-TR / CIE-11; Pillmann F et al.',
   desc:'Episodio psicótico breve (<1 mes DSM-5; <3 meses CIE-11) con síntomas polimorfos y cambiantes. Alta heterogeneidad longitudinal. La conversión a esquizofrenia o TB I ocurre en 25-40% de los casos.',
   feats:['Duración <1 mes (DSM-5) / <3 meses (CIE-11)','Síntomas polimorfos y rápidamente cambiantes','Alta tasa de remisión completa con tratamiento adecuado','Conversión a esquizofrenia o TB I: 25-40% en seguimientos a largo plazo','Con o sin estresor precipitante identificable (criterio opcional)','La heterogeneidad longitudinal hace del diagnóstico definitivo una tarea prospectiva','Evaluación longitudinal obligatoria para la reclasificación'],
   tx:'Antipsicóticos a corto plazo; BZD para la agitación; evaluación longitudinal obligatoria.',
   note:'La heterogeneidad longitudinal es la característica definitoria de la psicosis breve polimorfa. La remisión completa del primer episodio no garantiza la ausencia de recurrencias ni la no conversión a trastorno crónico. El seguimiento a largo plazo es indispensable.'},
  {id:'cbipesq',n:'Continuo bipolar-esquizoafectivo-esqfrénico',ab:'Continuo B-E',c:4,a:0,cs:'l',
   au:'Craddock N & Owen MJ Lancet 2005; PGC 2013, 2019',
   desc:'Modelo dimensional de continuo entre el polo afectivo puro (TB I) y el polo esquizofrénico puro, con el TEA como zona intermedia. Apoyado por datos genómicos del Psychiatric Genomics Consortium.',
   feats:['Factores genéticos compartidos entre TB I, TEA y Esquizofrenia (GWAS, PGC 2013, 2019)','Agregación familiar transdiagnóstica: familiares de TB tienen mayor riesgo de esquizofrenia','TEA como zona intermedia del continuo psicótico-afectivo','Apoyo de neuroimagen (gradientes morfológicos y de conectividad)','Cuestiona radicalmente la frontera categorial TB-Esquizofrenia','Crow TJ: "Einheitspsychose" moderna con base genómica','Implicaciones directas para la política farmacológica individualizada'],
   tx:'Ajustado al perfil individual: más estabilizadores en polo afectivo, más antipsicóticos en polo esquizofrénico; clozapina en formas con alta carga psicótica refractaria.',
   note:'El PGC (2013, 2019) proporciona la base genómica más robusta para el modelo del continuo psicótico-afectivo. Craddock & Owen (Lancet, 2005) sistematizaron la evidencia. El concepto tiene implicaciones directas para la individualización del tratamiento farmacológico.'},
 ]},
