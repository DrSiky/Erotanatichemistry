 entities:[
  {id:'esq',n:'Esquizofrenia',ab:'Esqfr.',c:1,a:195,cs:'h',
   au:'DSM-5-TR / CIE-11; Bleuler E (1911); Kraepelin E (dementia praecox)',
   desc:'≥2 síntomas nucleares (delirios, alucinaciones, desorganización, síntomas negativos, conducta desorganizada) durante ≥6 meses. Alta heterogeneidad biológica y clínica. Deterioro funcional en la mayoría de los casos.',
   feats:['≥2 síntomas nucleares durante ≥6 meses; al menos 1 debe ser positivo (delirios, alucinaciones o desorganización)','Cinco dominios clínicos: positivos, negativos, desorganización, cognitivos y afectivos','Deterioro funcional progresivo en la mayoría de los casos','Alta comorbilidad: TUS (80%), síntomas depresivos (60%), trastorno metabólico','Riesgo de suicidio consumado: 5-10% a 20 años; 25-50% lo intentan al menos una vez','Heterogeneidad biológica como entidad unitaria: comparable a la del cáncer','Endofenotipos cognitivos: predictores del pronóstico funcional más potentes que los síntomas positivos'],
   tx:'Antipsicóticos 2ª generación (olanzapina, risperidona, aripiprazol, quetiapina: 1ª línea); clozapina en esquizofrenia refractaria (fracaso ≥2 ensayos adecuados); rehabilitación psicosocial (nivel I); TEC en catatonia o formas refractarias graves.',
   note:'La heterogeneidad de la esquizofrenia como entidad unitaria es comparable a la del cáncer. Los modelos dimensionales (positivos, negativos, desorganización, afectivos, cognitivos) tienen más valor pronóstico que la categoría global. La clozapina sigue siendo el único antipsicótico con eficacia específicamente documentada en esquizofrenia refractaria.'},
  {id:'tesqfren',n:'T. esquizofreniforme',ab:'T.esqfrenif.',c:1,a:165,cs:'h',
   au:'DSM-5-TR / CIE-11; Langfeldt G (1937)',
   desc:'Síntomas esquizofrénicos completos durante 1-6 meses. Categoría provisional por definición. Alta tasa de conversión a esquizofrenia o TEA en el seguimiento longitudinal.',
   feats:['Síntomas esquizofrénicos completos durante 1-6 meses','Sin criterio de duración plena de esquizofrenia (>6 meses)','Conversión a esquizofrenia: 30-60% en seguimiento','Con o sin características de buen pronóstico (inicio agudo, confusión, afectividad conservada)','Evaluación longitudinal obligatoria para reclasificación definitiva','Langfeldt (1937): precursor histórico con el concepto de psicosis esquizofreniforme benigna'],
   tx:'Similar a esquizofrenia; antipsicóticos a dosis mínimas eficaces; seguimiento estrecho en los primeros 6 meses.',
   note:'Es una categoría provisional por definición. La mayoría convierte a esquizofrenia o TEA en el seguimiento. Las características de buen pronóstico (inicio agudo, presencia de confusión, afectividad conservada) predicen mejor evolución.'},
  {id:'tdelirant',n:'T. delirante',ab:'T.delir.',c:1,a:25,cs:'h',
   au:'DSM-5-TR / CIE-11; Kraepelin E (paranoia); Jaspers K',
   desc:'Delirios no bizarros persistentes (plausibles culturalmente) sin otros síntomas psicóticos prominentes ni deterioro funcional global. Alta resistencia farmacológica. Subtipo paranoide próximo al polo afectivo.',
   feats:['Delirios no bizarros persistentes (≥1 mes): persecutorio, erotomaíaco, grandioso, celotípico, somático, mixto','Sin alucinaciones prominentes, desorganización ni síntomas negativos','Funcionamiento relativamente preservado fuera del tema delirante','Alta resistencia al tratamiento antipsicótico estándar','Jaspers: comprensible en génesis pero incomprensible en contenido específico (desarrollo paranoico)','La alianza terapéutica es el elemento terapéutico más eficaz disponible','Diferente de la esquizofrenia paranoide: sin deterioro de la personalidad global'],
   tx:'Antipsicóticos (eficacia limitada); psicoterapia cognitiva (abordaje de consecuencias funcionales del delirio, no del contenido); alianza terapéutica como eje del tratamiento.',
   note:'La resistencia farmacológica es característica del T. delirante. La alianza terapéutica y el trabajo sobre las consecuencias funcionales del delirio (no sobre su contenido) son los elementos con mejor evidencia. Jaspers la diferenciaba del desarrollo paranoico ("comprensible") de la paranoia esquizofrénica.'},
  {id:'tpsbr',n:'T. psicótico breve',ab:'T.ps.br.',c:1,a:10,cs:'h',
   au:'DSM-5-TR / CIE-11',
   desc:'Episodio psicótico <1 mes (DSM-5) con remisión completa al nivel funcional previo. Alta heterogeneidad longitudinal: remisión definitiva vs. conversión a trastorno crónico.',
   feats:['Duración <1 mes con remisión completa al nivel funcional previo','Puede o no tener estresor precipitante identificable','Conversión a esquizofrenia o TB I: ~25-40% en seguimientos a largo plazo','Alta variabilidad longitudinal: el diagnóstico definitivo requiere tiempo','Evaluación longitudinal obligatoria para la reclasificación','La remisión completa del primer episodio no descarta recurrencias futuras'],
   tx:'Antipsicóticos a corto plazo a dosis mínimas eficaces; BZD para la agitación; tratamiento del estresor si hay marcador; seguimiento estrecho.',
   note:'La remisión completa no descarta la recurrencia ni la conversión a trastorno crónico. El seguimiento a largo plazo es indispensable. En muchos casos es la primera manifestación de un espectro bipolar o esquizofrénico que se irá definiendo con el tiempo.'},
  {id:'catatonia',n:'Catatonia (síndrome transnosológico)',ab:'Catatonia',c:1,a:130,cs:'h',
   au:'Kahlbaum KL (1874); DSM-5-TR (especificador); Fink M & Taylor MA (2006)',
   desc:'Síndrome psicomotor transnosológico: mutismo, inmovilidad, posturas anómalas, negativismo, estereotipias, ecolalia, ecopraxia. Asociado a múltiples condiciones médicas y psiquiátricas. Catatonia maligna: emergencia médica.',
   feats:['Síntomas nucleares: estupor, catalepsia, flexibilidad cérea, mutismo, negativismo, posturing, ecolalia, ecopraxia','Asociado a: esquizofrenia, TB I maníaco, depresión psicótica, enfermedades médicas, fármacos','Catatonia maligna: hipertermia, disautonomía, rabdomiólisis → emergencia médica','Test de lorazepam (1-2 mg IV): valor diagnóstico y terapéutico (resolución parcial transitoria)','TEC: tratamiento de elección en catatonia crónica, maligna o refractaria a BZD','Kahlbaum (1874): primera descripción sistemática como síndrome independiente','Frecuentemente infradiagnosticada en contextos de hospitalización general'],
   tx:'Benzodiacepinas IV (lorazepam): primera elección en catatonia aguda; TEC: elección en catatonia crónica, maligna o refractaria a BZD; suspensión de antipsicóticos en catatonia maligna.',
   note:'Kahlbaum (1874) describió la catatonia como síndrome autónomo antes de que Kraepelin la subsumiese bajo la dementia praecox. El TEC es el tratamiento con mayor eficacia en catatonia crónica y maligna. La catatonia maligna (con hipertermia y disautonomía) es una emergencia médica con mortalidad >20% sin tratamiento.'},
  // C2
  {id:'urh',n:'Sínd. de alto riesgo psicótico (UHR)',ab:'SRP/UHR',c:2,a:260,cs:'m',
   au:'McGorry PD et al.; Yung AR et al.; PACE / CAARMS criteria',
   desc:'Estado mental de riesgo ultra-alto: síntomas psicóticos atenuados (ARMS), breves e intermitentes (BLIPS), o deterioro funcional con vulnerabilidad genética. Conversión a psicosis franca: 20-35% en 2-3 años.',
   feats:['ARMS: síntomas psicóticos atenuados (por debajo del umbral diagnóstico)','BLIPS: síntomas psicóticos breves e intermitentes con resolución espontánea','GRFD: deterioro funcional en persona con familiar 1er grado con psicosis','Tasa de conversión: 20-35% en 2-3 años con criterios ARMS/BLIPS','CAARMS y SIPS: instrumentos de evaluación de referencia','Factores de mal pronóstico: bajo funcionamiento basal, TUS activo, síntomas negativos prominentes','La intervención precoz reduce la tasa de conversión (TCC, omega-3)'],
   tx:'TCC para psicosis (nivel I para reducción de conversión); omega-3 AGPI (evidencia emergente); antipsicóticos a dosis bajas solo en alto riesgo; evitar cannabis y estimulantes.',
   note:'La intervención precoz en el estado UHR es la estrategia con mayor potencial de impacto en la carga de la esquizofrenia. La TCC para psicosis tiene evidencia de nivel I para reducir la tasa de conversión. La DUP (duración de psicosis no tratada) es el predictor más potente del pronóstico.'},
  {id:'esqtclin',n:'Esquizotipia clínica',ab:'Esqtip.cl.',c:2,a:280,cs:'m',
   au:'Raine A; Meehl PE; Chapman LJ & Chapman JP',
   desc:'Expresión fenotípica subclínica del genotipo de riesgo esquizofrénico: pensamiento mágico, experiencias de referencia, percepción inusual, anhedonia social, lenguaje vago. El "fenotipo esquizotáxico" de Meehl.',
   feats:['Pensamiento mágico y creencias inusuales (telepatía, sexto sentido, auras)','Experiencias perceptivas inusuales: sin alcanzar el nivel de alucinaciones','Lenguaje vago, circunstancial o metafórico','Comportamiento excéntrico','Anhedonia social y aislamiento preferente como rasgo estable','SPQ, STA, CAPE: instrumentos de evaluación validados','Meehl: expresión fenotípica del "esquizotaxo" (anomalía neurológica de riesgo)'],
   tx:'Intervención psicosocial; psicoterapia; dosis bajas de antipsicóticos solo en casos con alta sintomatología y deterioro funcional.',
   note:'Meehl concibió la esquizotipia como el fenotipo observable del "esquizotaxo", la anomalía neurológica subyacente al riesgo genético de esquizofrenia. Puede ser expresión fenotípica del genotipo de riesgo o una forma de personalidad sin conversión.'},
  {id:'pep',n:'Primer episodio psicótico (PEP)',ab:'PEP',c:2,a:350,cs:'m',
   au:'International Early Psychosis Association; ORYGEN; IEPA guidelines',
   desc:'Primer episodio psicótico completo. Período crítico para la intervención temprana (ventana de oportunidad). El diagnóstico definitivo exige seguimiento longitudinal.',
   feats:['Primera presentación de psicosis completa en la historia vital del individuo','Período crítico: los primeros 2-5 años definen el trayecto longitudinal del trastorno','Sin diagnóstico definitivo hasta el seguimiento longitudinal (provisionalidad obligatoria)','Alta tasa de remisión con tratamiento adecuado precoz: 60-80%','DUP: predictor más potente del pronóstico a largo plazo (cada semana adicional empeora)','Programas ITP (ORYGEN, IEPA): mayor nivel de evidencia para prevención de cronicidad','Factores de mal pronóstico: larga DUP, bajo funcionamiento premórbido, síntomas negativos prominentes'],
   tx:'Antipsicóticos a dosis mínimas eficaces (inicio lento; mayor sensibilidad farmacológica en PEP); ITP; psicoeducación familiar; TCC para psicosis.',
   note:'La DUP (duración de psicosis no tratada) es el predictor más potente del pronóstico: cada semana adicional empeora los resultados funcionales a largo plazo. Los programas ITP (ORYGEN, IEPA) reducen la tasa de hospitalización, recaídas y discapacidad a largo plazo con evidencia de nivel I.'},
  {id:'psaten',n:'Psicosis atenuada / subumbral',ab:'Ps.aten.',c:2,a:50,cs:'m',
   au:'DSM-5-TR (condición para estudio); McGorry P; Schultze-Lutter F',
   desc:'Síntomas psicóticos presentes pero por debajo del umbral diagnóstico, con insight parcialmente conservado. Zona de transición entre esquizotipia y psicosis franca. Tasa de conversión: 15-25%.',
   feats:['Síntomas psicóticos subumbrales con insight parcialmente conservado','Insight: diferencia crítica de la psicosis franca (el paciente reconoce la posible irrealidad)','Tasa de conversión a psicosis completa: 15-25% en 2-3 años','Incluida en DSM-5 como "condición para estudio" (no diagnóstico formal)','Zona de transición: UHR → Psicosis atenuada → Psicosis franca','El insight como marcador de gravedad y diferencial','Intervención en este estadio maximiza el beneficio clínico'],
   tx:'TCC para psicosis; omega-3 AGPI; seguimiento estrecho con CAARMS/SIPS.',
   note:'La psicosis atenuada representa la zona de oportunidad clínica de mayor potencial. La intervención en este estadio puede prevenir o retrasar la conversión a psicosis franca y reducir la carga del episodio inicial.'},
  {id:'psust',n:'Psicosis inducida por sustancias / NPS',ab:'Ps.sust.',c:2,a:310,cs:'m',
   au:'Murray RM et al.; Di Forti M et al. Lancet Psychiatry 2019; Arseneault L',
   desc:'Psicosis precipitada o mantenida por consumo de sustancias (cannabis de alta potencia, anfetaminas, NPS, MDMA). Especialmente relevante en el contexto del chemsex y los nuevos psicoactivos.',
   feats:['Cannabis de alta potencia (>10% THC): OR>5 para psicosis (Di Forti et al., 2019)','NPS con efecto dopaminérgico (mefedrona, alfa-PVP, MDPV): especialmente asociados a psicosis en chemsex','Anfetaminas y MDMA: psicosis por dopamina y serotonina respectivamente','Reducción del consumo: factor modificable de pronóstico más potente','Diagnóstico diferencial: ¿psicosis inducida o funcional subyacente? (seguimiento 4-6 semanas sin consumo)','Alta tasa de conversión a psicosis funcional en consumidores crónicos (20-40%)','Especialmente relevante en el contexto del chemsex y la privación de sueño asociada'],
   tx:'Suspensión de la sustancia como primera intervención; antipsicóticos a corto plazo; psicoeducación sobre el riesgo de recaída; abordaje del TUS; seguimiento a largo plazo.',
   note:'Di Forti et al. (Lancet Psychiatry, 2019): el consumo diario de cannabis de alta potencia aumenta el riesgo de psicosis en un factor de 5. La distinción entre psicosis inducida y funcional subyacente requiere seguimiento de al menos 4-6 semanas sin consumo activo.'},
  {id:'esqtpersonalidad',n:'Trastorno de la personalidad esquizotípico',ab:'TP esquizot.',c:2,a:295,cs:'m',
   au:'DSM-5-TR; CIE-11; Raine A; Meehl PE',
   desc:'Patrón persistente de relaciones interpersonales deficientes, distorsiones cognitivo-perceptivas e ideas de referencia, excentricidades del comportamiento y pensamiento mágico. Alta comorbilidad con TOC y TLP.',

   tx:'Antipsicóticos a dosis bajas (evidencia moderada); psicoterapia (TCC, DBT si hay comorbilidad con TLP); intervención psicosocial.',

// ════════════════════════════════════════════════════════════════════
// SPECTRUM APP LOGIC
// ════════════════════════════════════════════════════════════════════
const NS_SVG='http://www.w3.org/2000/svg';
let curSpec='dep',curRing='all',curSearch='',curEnt=null;

function nel(t,a,p){const e=document.createElementNS(NS_SVG,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,String(v));if(p)p.appendChild(e);return e}
function pt(cx,cy,r,deg){const rad=deg*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad),ca:Math.cos(rad),sa:Math.sin(rad)}}

function switchSpec(btn){
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  switchSpecById(btn.dataset.spec);
}
function switchSpecById(id){
  curSpec=id;curRing='all';curEnt=null;
  document.querySelectorAll('.rbtn').forEach(b=>{b.classList.toggle('on',b.dataset.r==='all')});
  document.getElementById('specSearch').value='';curSearch='';
  const scol=SPECTRA[id].col;
  document.querySelectorAll('.stab').forEach(b=>{if(b.dataset.spec===id)b.classList.add('on')});
  document.querySelectorAll('.rbtn').forEach(b=>{
    b.style.borderColor=b.classList.contains('on')?scol:'#ccc';
    b.style.background=b.classList.contains('on')?scol:'transparent';
    b.style.color=b.classList.contains('on')?'white':'#888';
  });
  drawMap();renderCards();renderSpecDetail();
}

function filterRing(btn){
  curRing=btn.dataset.r;curEnt=null;
  document.querySelectorAll('.rbtn').forEach(b=>{b.classList.remove('on');b.style.background='transparent';b.style.color='#888';b.style.borderColor='#ccc'});
  btn.classList.add('on');
  const scol=SPECTRA[curSpec].col;
  btn.style.background=scol;btn.style.color='white';btn.style.borderColor=scol;
  drawMap();renderCards();renderSpecDetail();
}
function onSearch(v){curSearch=v;curEnt=null;drawMap();renderCards();renderSpecDetail()}

function drawMap(){
  const svg=document.getElementById('mapsvg');svg.innerHTML='';
  // Large viewBox — labels need room beyond the outermost ring
  const VW=780,VH=780;
  svg.setAttribute('viewBox',`0 0 ${VW} ${VH}`);
  const sp=SPECTRA[curSpec];
  const R=[72,140,210,278],cx=VW/2,cy=VH/2;
  const scol=sp.col;

  // ── Sector fills + labels ──
  // SAME coordinate system as pt(): 0°=right, 90°=bottom, 180°=left, 270°=top (clockwise in SVG)
  sp.sectors.forEach(s=>{
    const a1=s.a1*Math.PI/180, a2=s.a2*Math.PI/180;
    const rr=R[3]+40,x1=cx+rr*Math.cos(a1),y1=cy+rr*Math.sin(a1),x2=cx+rr*Math.cos(a2),y2=cy+rr*Math.sin(a2);
    const large=((s.a2-s.a1+360)%360)>180?1:0;
    nel('path',{d:`M${cx},${cy}L${x1},${y1}A${rr},${rr} 0 ${large},1 ${x2},${y2}Z`,fill:s.col,opacity:'.07'},svg);

    if(s.lbl){
      const span=(s.a2-s.a1+360)%360;
      const midDeg=s.a1+span/2;
      const midRad=midDeg*Math.PI/180;
      const lr=R[3]+65;
      const lx=cx+lr*Math.cos(midRad),ly=cy+lr*Math.sin(midRad);
      const ca=Math.cos(midRad),sa=Math.sin(midRad);
      const ta=ca>=0.2?'start':ca<=-0.2?'end':'middle';
      const db=sa>0.3?'hanging':sa<-0.3?'auto':'middle';

      // Background capsule for readability
      const lblG=nel('g',{opacity:'.85'},svg);
      const tEl=nel('text',{
        x:lx,y:ly,'text-anchor':ta,'dominant-baseline':db,
        fill:s.col,'font-size':'10.5',
        'font-family':"'DM Sans',system-ui,sans-serif",
        'font-weight':'700','font-style':'italic',
        'paint-order':'stroke',
        'stroke':'rgba(255,255,255,.92)',
        'stroke-width':'3.5','stroke-linejoin':'round'
      },lblG);
      tEl.textContent=s.lbl;
    }
  });

  // ── Rings ──
  for(let i=3;i>=0;i--){
    const c=i+1;
    nel('circle',{cx,cy,r:R[i],fill:RCF[c]||scol+'08',stroke:scol,
      'stroke-width':c===1?2:1,
      'stroke-dasharray':c===4?'8,5':'',
      'opacity':c===4?.55:1},svg);
  }

  // ── Pole axis ──


  // ── Ring labels ──
  [1,2,3,4].forEach(c=>{
    const t=nel('text',{x:cx+3,y:cy-R[c-1]+12,fill:scol,'font-size':'10','font-family':"'DM Sans',system-ui,sans-serif",'font-weight':'700','opacity':'.45'},svg);
    t.textContent=`C${c}`;
  });

  // ── Nucleus box ──
  nel('rect',{x:cx-70,y:cy-30,width:140,height:58,rx:6,fill:scol+'14',stroke:scol,'stroke-width':'1.5'},svg);
  const nt=nel('text',{x:cx,y:cy-17,'text-anchor':'middle',fill:scol,'font-size':'9','font-family':"'DM Sans',system-ui,sans-serif",'font-weight':'700'},svg);nt.textContent='NÚCLEO DSM-5 / CIE-11';
  const c1ents=sp.entities.filter(e=>e.c===1);
  const nt2=nel('text',{x:cx,y:cy-3,'text-anchor':'middle',fill:scol,'font-size':'10','font-family':"'DM Sans',system-ui,sans-serif",'font-weight':'600'},svg);nt2.textContent=c1ents.slice(0,2).map(e=>e.ab).join(' · ');
  const nt3=nel('text',{x:cx,y:cy+10,'text-anchor':'middle',fill:scol+'aa','font-size':'9','font-family':"'DM Sans',system-ui,sans-serif"},svg);nt3.textContent=c1ents.slice(2).map(e=>e.ab).join(' · ');

  if(['dep','bip'].includes(curSpec)){
    nel('rect',{x:cx-72,y:cy+28,width:144,height:17,rx:3,fill:'rgba(192,57,43,.08)',stroke:'#c0392b55','stroke-width':'.7'},svg);
    const warn=nel('text',{x:cx,y:cy+37,'text-anchor':'middle','dominant-baseline':'middle',fill:'#c0392b','font-size':'8.5','font-family':"'DM Sans',system-ui,sans-serif",'font-weight':'600'},svg);
    warn.textContent='⚠ Vigilar iatrogenia por AD';
  }

  // ── Entity nodes with labels ──
  // Label: use abbreviated form (ab), placed radially outside the dot
  const DOT_R={1:5,2:4.5,3:4,4:3.5};
  const LBL_OFFSET={1:14,2:13,3:12,4:11};
  const LBL_FS={1:9.5,2:9,3:8.5,4:8};

  sp.entities.forEach(e=>{
    const r=R[e.c-1],p=pt(cx,cy,r,e.a);
    const isActive=curEnt&&curEnt.id===e.id;
    const isRF=curRing==='all'||Number(curRing)===e.c;
    const isSF=!curSearch||e.n.toLowerCase().includes(curSearch.toLowerCase())||e.ab.toLowerCase().includes(curSearch.toLowerCase());
    const dim=!(isRF&&isSF);
    const cc={h:'#e53e3e',m:'#ed8936',l:'#3b82f6'}[e.cs];
    const dr=DOT_R[e.c]||(isActive?7:4);
    const lo=LBL_OFFSET[e.c]||12;
    const lfs=LBL_FS[e.c]||9;

    const g=nel('g',{cursor:'pointer','data-id':e.id,opacity:dim?.15:1},svg);

    // Spoke line from ring surface to label
    const lp=pt(cx,cy,r,e.a);
    const sp2=pt(cx,cy,r+(dr+2),e.a);
    const ep=pt(cx,cy,r+lo,e.a);
    nel('line',{x1:sp2.x,y1:sp2.y,x2:ep.x,y2:ep.y,stroke:scol,'stroke-width':'.4','opacity':dim?.1:.3},g);

    // Dot
    nel('circle',{cx:p.x,cy:p.y,r:isActive?dr+3:dr,fill:cc,stroke:scol,'stroke-width':isActive?2:1},g);
    if(isActive){
      nel('circle',{cx:p.x,cy:p.y,r:dr+7,fill:'none',stroke:scol,'stroke-width':'1.5','stroke-dasharray':'3,3','opacity':'.5'},g);
    }

    // Label: abbreviated name placed radially
    const lx=pt(cx,cy,r+lo+3,e.a);
    // Text anchor: right half → start, left half → end, top/bottom → middle
    const ta=p.ca>=0.2?'start':p.ca<=-0.2?'end':'middle';
    const db=p.sa>0.3?'hanging':p.sa<-0.3?'auto':'middle';
    const lbl=e.ab.length>18?e.ab.slice(0,17)+'…':e.ab;
    const lt=nel('text',{
      x:lx.x,y:lx.y,
      'text-anchor':ta,'dominant-baseline':db,
      fill:dim?scol+'44':cc,
      'font-size':lfs,
      'font-family':"'DM Sans',system-ui,sans-serif",
      'font-weight':isActive?'700':'500',
      'pointer-events':'none',
      'paint-order':'stroke',
      'stroke':'rgba(255,255,255,.85)',
      'stroke-width':'2.5',
      'stroke-linejoin':'round'
    },g);
    lt.textContent=lbl;

    g.addEventListener('mouseenter',ev=>showTT(e,ev));
    g.addEventListener('mouseleave',()=>{document.getElementById('tt').style.display='none'});
    g.addEventListener('click',()=>selectEnt(e));
  });

  // ── Legend strip at bottom ──
  const legY=VH-12;
  nel('line',{x1:20,y1:legY-6,x2:VW-20,y2:legY-6,stroke:scol+'28','stroke-width':'.5'},svg);
  [{x:VW/2,t:'Radio → grado de consenso (C1 = máximo) · Ángulo → afinidad temperamental · Sectores → zonas temperamentales · Color nodo: rojo=alto / naranja=moderado / azul=bajo consenso'}].forEach(l=>{
    const el=nel('text',{x:l.x,y:legY,'text-anchor':'middle',fill:scol+'66','font-size':'8.5',
      'font-family':"'DM Sans',system-ui,sans-serif",'font-style':'italic'},svg);
    el.textContent=l.t;
  });
}

function showTT(e,ev){
  const tt=document.getElementById('tt');
  tt.innerHTML=`<strong>${e.n}</strong><br><span style="opacity:.7;font-size:9px">${RLBL[e.c]}</span>`;
  tt.style.display='block';tt.style.left=(ev.clientX+12)+'px';tt.style.top=(ev.clientY-8)+'px';
}
document.addEventListener('mousemove',ev=>{const tt=document.getElementById('tt');if(tt.style.display==='block'){tt.style.left=(ev.clientX+12)+'px';tt.style.top=(ev.clientY-8)+'px'}});

function selectEnt(e){
  curEnt=e;drawMap();
  const card=document.querySelector(`.card[data-id="${e.id}"]`);
  if(card){document.querySelectorAll('.card').forEach(c=>{c.classList.remove('active')});card.classList.add('active');card.scrollIntoView({block:'nearest',behavior:'smooth'})}
  renderSpecDetail();
}

function renderCards(){
  const container=document.getElementById('cards');container.innerHTML='';
  const sp=SPECTRA[curSpec];
  const filtered=sp.entities.filter(e=>{
    const rf=curRing==='all'||Number(curRing)===e.c;
    const sf=!curSearch||e.n.toLowerCase().includes(curSearch.toLowerCase())||e.ab.toLowerCase().includes(curSearch.toLowerCase());
    return rf&&sf;
  });
  if(!filtered.length){container.innerHTML='<div class="empty">Sin resultados para ese filtro</div>';return}
  [1,2,3,4].forEach(r=>{
    const ring=filtered.filter(e=>e.c===r);if(!ring.length)return;
    const hdr=document.createElement('div');
    hdr.style.cssText=`grid-column:1/-1;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:${RCC[r]};padding:5px 2px 2px;border-bottom:.5px solid ${RCC[r]}44;margin-top:3px`;
    hdr.textContent=RLBL[r];container.appendChild(hdr);
    ring.forEach(e=>{
      const card=document.createElement('div');
      card.className='card'+(curEnt&&curEnt.id===e.id?' active':'');
      card.dataset.id=e.id;
      card.style.borderLeftColor=RCC[e.c];
      card.innerHTML=`<div class="card-ring" style="color:${RCC[e.c]}">${RLBL[e.c]}</div><div class="card-name">${e.n}</div><div class="card-ab">${e.ab}</div><div class="card-tags"><span class="tag ${CONS[e.cs].cls}">${CONS[e.cs].lbl}</span></div>`;
      card.onclick=()=>selectEnt(e);
      container.appendChild(card);
    });
  });
}

function renderSpecDetail(){
  const inner=document.getElementById('specDetail-inner');
  if(!curEnt){inner.innerHTML='<div id="specDetail-empty" style="display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;color:#bbb0a0;font-size:12px;line-height:1.6;font-family:\'EB Garamond\',Georgia,serif;font-style:italic">Selecciona una entidad<br>en el mapa o en las tarjetas</div>';return}
  const e=curEnt;const cc=RCC[e.c];const cs=CONS[e.cs];const scol=SPECTRA[curSpec].col;
  inner.innerHTML=`<div><div class="dbdg" style="color:${cc};border-color:${cc}40">${RLBL[e.c]}</div><div class="dname">${e.n}</div><div class="dau">${e.au||''}</div>${e.desc?`<div class="ddesc">${e.desc}</div>`:''}`+
  (e.feats&&e.feats.length?`<div class="dsh">Características clínicas</div><ul class="dfeats">${e.feats.map(f=>`<li>${f}</li>`).join('')}</ul>`:'')+
  (e.tx?`<div class="dsh">Orientación farmacoterapéutica</div><div class="dtx" style="background:${cc}08;border:.5px solid ${cc}20">${e.tx}</div>`:'')+
  (e.note?`<div class="dnote" style="border-left-color:${cc}">${e.note}</div>`:'')+
  `<div class="dcons"><div style="width:9px;height:9px;border-radius:50%;background:${cs.col};flex-shrink:0"></div>${cs.lbl}</div></div>`;
}

// Init
switchSpecById('dep');
</script>
