         name: Java setup demo

on:
  workflow_dispatch:      # Lo lanzas a mano desde la pestaña Actions

jobs:
  java-setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'      # Distribución recomendada (Eclipse Temurin)
          java-version: '21'           # Versión LTS moderna

      - name: Comprobar versión de Java
        run: java -version
